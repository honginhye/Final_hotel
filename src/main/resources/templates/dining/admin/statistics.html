<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
    <title>매출 및 예약 통계</title>
    
    <th:block th:fragment="link"></th:block>

    <th:block th:fragment="script">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        
        <script th:inline="javascript">
            $(document).ready(function() {
                const statsJson = /*[[${statsJson}]]*/ '[]';
                const timeStatsJson = /*[[${timeStatsJson}]]*/ '[]';
                
                const statsData = JSON.parse(statsJson);
                const timeStats = JSON.parse(timeStatsJson);
                
                $('#diningSelect').on('change', function() {
                    const diningId = $(this).val();
                    if(diningId) {
                        location.search = '?diningId=' + diningId;
                    }
                });

                if (!statsData || statsData.length === 0) {
                    $('#recommendationBox').html("💡 <strong>안내:</strong> 선택하신 매장의 최근 데이터가 없습니다.");
                    return;
                }

                const labels = statsData.map(item => item.RES_DATE);
                const counts = statsData.map(item => item.DAILY_COUNT);
                const revenues = statsData.map(item => item.DAILY_REVENUE);

                const ctx1 = document.getElementById('revenueChart').getContext('2d');
                new Chart(ctx1, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '일별 매출액 (₩)',
                            data: revenues,
                            backgroundColor: 'rgba(157, 129, 93, 0.6)',
                            borderColor: '#9d815d',
                            borderWidth: 1
                        }]
                    },
                    options: { 
                        responsive: true,
                        scales: { y: { beginAtZero: true } }
                    }
                });

                const ctx2 = document.getElementById('countChart').getContext('2d');
                new Chart(ctx2, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '일별 예약 건수',
                            data: counts,
                            borderColor: '#846c4d',
                            backgroundColor: 'rgba(132, 108, 77, 0.2)',
                            tension: 0.3,
                            fill: true,
                            pointRadius: 5,
                            pointBackgroundColor: '#846c4d'
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                    }
                });
                
                let totalRev = 0;
                let totalCnt = 0;
                statsData.forEach(item => {
                    totalRev += (item.DAILY_REVENUE || 0);
                    totalCnt += (item.DAILY_COUNT || 0);
                });

                $('#totalRevenue').text(totalRev.toLocaleString() + '원');
                $('#totalCount').text(totalCnt + '건');
                $('#avgRevenue').text(totalCnt > 0 ? Math.floor(totalRev / totalCnt).toLocaleString() + '원' : '0원');

                const timeLabels = timeStats.map(item => item.RES_TIME);
                const timeCounts = timeStats.map(item => item.TIME_COUNT);
                
                const ctxTime = document.getElementById('timeSlotChart').getContext('2d');
                new Chart(ctxTime, {
                    type: 'doughnut',
                    data: {
                        labels: timeLabels,
                        datasets: [{
                            data: timeCounts,
                            backgroundColor: ['#d4af37', '#e5c06d', '#bc9a27', '#f1d592', '#a68516', '#cfb53b'],
                            hoverOffset: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'bottom' } },
                        cutout: '60%'
                    }
                });
                
                if (timeCounts.length > 0) {
                    const maxVal = Math.max(...timeCounts);
                    const maxIdx = timeCounts.indexOf(maxVal);
                    const peakTime = timeLabels[maxIdx];

                    let insight = `💡 <strong>데이터 분석 결과:</strong><br>`;
                    insight += `최근 일주일 동안 <strong>${peakTime}</strong> 시간대에 가장 많은 예약(${maxVal}건)이 집중되었습니다. `;
                    insight += `해당 시간대의 인력 배치 강화 및 예약 가능 인원을 늘리고, 테이블 세팅을 미리 준비하는 것을 권장합니다.`;
                    $('#recommendationBox').html(insight);
                } else {
                    $('#recommendationBox').html("💡 충분한 방문 데이터가 수집된 후 운영 인사이트가 제공됩니다.");
                }
            });
        </script>
    </th:block>

    <th:block th:fragment="style">
        <style>
            #mycontent { padding-top: 150px; padding-bottom: 100px; background: #f8f9fa; min-height: 100vh; }
            .stat-card { background: #fff; border-radius: 15px; padding: 25px; margin-bottom: 25px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
            .stat-card:hover { transform: translateY(-5px); }
            .gold-title { color: #9d815d; font-family: 'Noto Serif KR', serif; font-weight: 700; }
            .summary-val { font-size: 1.5rem; font-weight: 800; margin-bottom: 0; }
            .border-left-gold { border-left: 5px solid #d4af37 !important; }
        </style>
    </th:block>
</head>
<body>
    <div th:fragment="content">
        <div id="mycontent">
            <div class="container">
                <div class="mb-5 text-center">
                    <h2 class="gold-title text-uppercase" style="letter-spacing: 2px;">Dining Analytics Report</h2>
                    <p class="text-muted">매장별 매출 추이 및 예약 패턴 분석 데이터</p>
                </div>

                <div class="stat-card mb-4">
                    <div class="d-flex align-items-center justify-content-center">
                        <label for="diningSelect" class="gold-title me-3 mb-0">Analysis Target :</label>
                        <select id="diningSelect" class="form-select" style="width: 350px; border-radius: 20px;">
                            <option value="">-- 매장을 선택하세요 --</option>
                            <th:block th:each="dining : ${diningList}">
                                <option th:value="${dining.DINING_ID}" 
                                        th:text="${dining.NAME}"
                                        th:selected="${#strings.equals(dining.DINING_ID, selectedDiningId)}">
                                </option>
                            </th:block>
                        </select>
                    </div>
                </div>
                
                <div class="row mb-2">
                    <div class="col-md-4"><div class="stat-card p-3 text-center"><p class="small text-muted mb-1">Weekly Revenue</p><p id="totalRevenue" class="summary-val gold-title">0원</p></div></div>
                    <div class="col-md-4"><div class="stat-card p-3 text-center"><p class="small text-muted mb-1">Weekly Visits</p><p id="totalCount" class="summary-val text-dark">0명</p></div></div>
                    <div class="col-md-4"><div class="stat-card p-3 text-center"><p class="small text-muted mb-1">Average Sale</p><p id="avgRevenue" class="summary-val text-success">0원</p></div></div>
                </div>

                <div class="row">
                    <div class="col-lg-8">
                        <div class="stat-card">
                            <h5 class="gold-title mb-4"><i class="bi bi-graph-up-arrow"></i> Daily Revenue Trend</h5>
                            <canvas id="revenueChart" style="max-height: 350px;"></canvas>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="stat-card">
                            <h5 class="gold-title mb-4"><i class="bi bi-pie-chart-fill"></i> Peak Time Analysis</h5>
                            <canvas id="timeSlotChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-lg-8">
                        <div class="stat-card">
                            <h5 class="gold-title mb-4"><i class="bi bi-calendar-check"></i> Reservation Volume</h5>
                            <canvas id="countChart" style="max-height: 300px;"></canvas>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="stat-card border-left-gold">
                            <h5 class="gold-title mb-3"><i class="bi bi-lightbulb-fill"></i> Smart Insight</h5>
                            <div id="recommendationBox" class="text-muted" style="font-size: 0.95rem; line-height: 1.8;">
                                데이터를 불러오는 중입니다...
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
