<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">

<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">
<title>호텔 등록</title>

<!-- Bootstrap 추가 (UI 개선) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- 지도 -->
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=c2014221291f1b63602c92cea5292906&libraries=services"></script>

<!-- 주소검색 -->
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<script>

$(document).ready(function(){

    /* ============================
       호텔 등록 (프론트 유효성 추가)
    ============================ */
    $("#btnRegister").click(function(){

        // ===== 프론트 검증 =====
        if(!$("input[name='hotel_name']").val()){
            alert("호텔명을 입력하세요");
            return;
        }

        if(!$("#address").val()){
            alert("주소를 선택하세요");
            return;
        }

        if(!$("#latitude").val()){
            alert("지도에서 위치를 선택하세요");
            return;
        }

        if(!$("#mainImage").val()){
            alert("대표 이미지를 선택하세요");
            return;
        }

        // ===== form 데이터 =====
        const formData =
            new FormData($("form[name='hotelFrm']").get(0));

        const token = $("meta[name='_csrf']").attr("content");
        const header = $("meta[name='_csrf_header']").attr("content");

        $.ajax({
            url: "[[@{/admin/hotel/register}]]",
            type: "post",
            data: formData,
            processData: false,
            contentType: false,
            dataType: "json",
            beforeSend: function(xhr){
                xhr.setRequestHeader(header, token);
            },
            success: function(json){

                if(json.result == 1){
                    alert("호텔 등록 성공");
                    location.href = "/final_hotel/admin/hotel/list";
                }
                else{
                    alert(json.msg || "등록 실패");
                }
            }
        });

    });


    /* ============================
       이미지 미리보기 
    ============================ */
    $("#mainImage").change(function(e){

        const file = e.target.files[0];

        if(file){
            const reader = new FileReader();

            reader.onload = function(e){
                $("#preview").attr("src", e.target.result).show();
            }

            reader.readAsDataURL(file);
        }
    });


    /* ============================
       지도 + 주소검색
    ============================ */

    let map;
    let marker;
    let geocoder;

    /* 지도 생성 */
    const mapContainer = document.getElementById('map');

    const mapOption = {
        center: new kakao.maps.LatLng(37.5665, 126.9780),
        level: 5
    };

    map = new kakao.maps.Map(mapContainer, mapOption);

    marker = new kakao.maps.Marker({
        position: map.getCenter()
    });

    marker.setMap(map);

    geocoder = new kakao.maps.services.Geocoder();


    /* 지도 클릭 시 좌표 변경 */
    kakao.maps.event.addListener(map, 'click', function(mouseEvent) {

        const latlng = mouseEvent.latLng;

        marker.setPosition(latlng);

        $("#latitude").val(latlng.getLat());
        $("#longitude").val(latlng.getLng());

    });


    /* 주소 검색 버튼 */
    $("#btnSearchAddr").click(function(){

        new daum.Postcode({

            oncomplete: function(data){

                const addr = data.address;

                $("#address").val(addr);

                /* 주소 → 좌표 변환 */
                geocoder.addressSearch(addr, function(result, status){

                    if(status === kakao.maps.services.Status.OK){

                        const coords = new kakao.maps.LatLng(result[0].y, result[0].x);

                        map.setCenter(coords);
                        marker.setPosition(coords);

                        $("#latitude").val(result[0].y);
                        $("#longitude").val(result[0].x);

                    }

                });

            }

        }).open();

    });

});

</script>

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">호텔 등록</h2>

    <form name="hotelFrm" enctype="multipart/form-data" class="card p-4 shadow-sm">

        <!-- 호텔명 -->
        <div class="mb-3">
            <label class="form-label">호텔명</label>
            <input type="text" name="hotel_name" class="form-control" required>
        </div>

        <!-- 주소 -->
        <div class="mb-3">
            <label class="form-label">주소</label><br>
            <input type="text" id="address" name="address" class="form-control mb-2" readonly>
            <button type="button" id="btnSearchAddr" class="btn btn-outline-secondary">
                주소 검색
            </button>
        </div>

        <!-- 지도 -->
        <div class="mb-3">
            <div id="map" style="width:100%;height:300px;border-radius:10px;"></div>
            <input type="hidden" name="latitude" id="latitude">
            <input type="hidden" name="longitude" id="longitude">
        </div>

        <!-- 연락처 -->
        <div class="mb-3">
            <label class="form-label">연락처</label>
            <input type="text" name="contact" class="form-control">
        </div>

        <!-- 설명 -->
        <div class="mb-3">
            <label class="form-label">설명</label>
            <textarea name="hotel_desc" rows="4" class="form-control"></textarea>
        </div>

        <!-- 대표 이미지 -->
        <div class="mb-3">
            <label class="form-label">대표 이미지</label>
            <input type="file" name="mainImage" id="mainImage" accept="image/*" class="form-control">
            <img id="preview" style="width:200px; margin-top:10px; display:none; border-radius:10px;">
        </div>

        <!-- 버튼 -->
        <div class="d-flex gap-2">
            <button type="button" id="btnRegister" class="btn btn-primary">
                등록
            </button>
            <button type="reset" class="btn btn-secondary">
                취소
            </button>
        </div>

    </form>

</div>

</body>
</html>
