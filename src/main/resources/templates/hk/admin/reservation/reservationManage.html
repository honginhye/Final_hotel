<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    
    <title>예약 관리 시스템</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        header h2 {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            margin: 0;
        }

        /* KPI 카드 섹션 */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary);
        }

        .kpi-title {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
        }

        /* 프로그레스 바 */
        .progress-section {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-bar-bg {
            width: 100%;
            background: #f1f5f9;
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--primary), var(--info));
            height: 100%;
            transition: width 0.5s ease-in-out;
        }

        /* 테이블 공통 섹션 */
        .section-card {
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .section-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 테이블 스타일 */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f8fafc;
            padding: 14px 24px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px 24px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #fcfcfd; }

        /* 상태 뱃지 */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-danger { background: #fee2e2; color: #b91c1c; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-success { background: #dcfce7; color: #15803d; }
        .badge-info { background: #e0f2fe; color: #0369a1; }

        /* 버튼 스타일 */
        .btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            gap: 4px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }

        .btn-outline-danger { 
            background: transparent; 
            color: var(--danger); 
            border: 1px solid var(--danger);
        }
        .btn-outline-danger:hover { background: var(--danger); color: white; }

        .btn-success { background: var(--success); color: white; }
        .btn-info { background: var(--info); color: white; }

        /* 지연 로우 강조 */
        .overdue-row td {
            background-color: #fff1f2;
        }

        .flex-actions {
            display: flex;
            gap: 8px;
        }

        form { margin: 0; }
        
        /* 🔥 버튼 강제 스타일 적용 */
button {
    display: inline-flex;
    align-items: center;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    background: #3b82f6;
    color: white;
    transition: all 0.2s;
}

/* hover 효과 */
button:hover {
    transform: translateY(-1px);
    opacity: 0.9;
}

/* 체크인 */
button[onclick*="CHECKIN"] {
    background: #10b981;
}

/* 노쇼 */
button[onclick*="NOSHOW"] {
    background: #ef4444;
}

/* 체크아웃 */
button[onclick*="CHECKOUT"] {
    background: #f97316;
}
    </style>
</head>

<body>

<div class="container">
    <header>
        <h2>🏨 예약 관리 대시보드</h2>
    </header>

    <div class="kpi-container">
        <div class="kpi-card">
            <div class="kpi-title">오늘 체크인 예정</div>
            <div class="kpi-value" th:text="${todayCheckinReserved} + '건'">0건</div>
        </div>
        <div class="kpi-card" style="--primary: var(--success)">
            <div class="kpi-title">오늘 체크인 완료</div>
            <div class="kpi-value" th:text="${todayCheckinDone} + '건'">0건</div>
        </div>
        <div class="kpi-card" style="--primary: var(--info)">
            <div class="kpi-title">현재 투숙중</div>
            <div class="kpi-value" th:text="${stayCount} + '건'">0건</div>
        </div>
        <div class="kpi-card" style="--primary: var(--warning)">
            <div class="kpi-title">객실 점유율</div>
            <div class="kpi-value" th:text="${occupancyRate} + '%'">0%</div>
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-header">
            <span style="font-weight: 700;">오늘 체크인 진행률</span>
            <span th:text="${checkinProgress} + '%'" style="color: var(--primary); font-weight: 800;">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" th:style="'width:' + ${checkinProgress} + '%'"></div>
        </div>
    </div>

    <div th:if="${not #lists.isEmpty(noShowList) or not #lists.isEmpty(overdueList)}" style="margin-bottom: 40px;">
        <div class="section-card" style="border-color: var(--danger);">
            <div class="section-header" style="background: #fff1f2;">
                <h3 style="color: var(--danger);">⚠ 즉시 조치 필요 (체크인/아웃 지연)</h3>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>상태</th>
                            <th>예약번호</th>
                            <th>예약자</th>
                            <th>객실</th>
                            <th>예정 시간</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${noShowList}" class="overdue-row">
                            <td><span class="badge badge-danger">체크인 지연</span></td>
                            <td th:text="${r['RESERVATION_ID']}"></td>
                            <td th:text="${r['NAME']}" style="font-weight: 600;"></td>
                            <td th:text="${r['ROOM_NAME']}"></td>
                            <td th:text="${#dates.format(r['CHECKIN_DATE'],'yyyy-MM-dd')}"></td>
                            <td>
                                <div class="flex-actions">
                                    <form th:action="@{/admin/reservation/checkin}" method="post">
                                        <input type="hidden" name="reservationId" th:value="${r['RESERVATION_ID']}">
                                        <button onclick="changeStatus('CHECKIN')">체크인</button>
                                    </form>
                                    <form th:action="@{/admin/reservation/noshow}" method="post">
                                        <input type="hidden" name="reservationId" th:value="${r['RESERVATION_ID']}">
                                        <button onclick="changeStatus('NOSHOW')">노쇼 처리</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:each="r : ${overdueList}" class="overdue-row">
                            <td><span class="badge badge-danger">미퇴실</span></td>
                            <td th:text="${r['RESERVATION_ID']}"></td>
                            <td th:text="${r['NAME']}" style="font-weight: 600;"></td>
                            <td th:text="${r['ROOM_NAME']}"></td>
                            <td th:text="${#dates.format(r['CHECKOUT_DATE'],'yyyy-MM-dd')}"></td>
                            <td>
                                <form th:action="@{/admin/reservation/checkout}" method="post">
                                    <input type="hidden" name="reservationId" th:value="${r['RESERVATION_ID']}">
                                    <button onclick="changeStatus('CHECKOUT')">즉시 체크아웃</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="section-card">
        <div class="section-header">
            <h3>📅 오늘 체크인 예정</h3>
        </div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>예약번호</th>
                        <th>고객명</th>
                        <th>객실</th>
                        <th>기간</th>
                        <th>결제액</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${checkinList}">
                        <td th:text="${r['RESERVATION_ID']}"></td>
                        <td th:text="${r['NAME']}" style="font-weight: 600;"></td>
                        <td th:text="${r['ROOM_NAME']}"></td>
                        <td>
                            <span th:text="${#dates.format(r['CHECKIN_DATE'],'MM.dd')}"></span> ~ 
                            <span th:text="${#dates.format(r['CHECKOUT_DATE'],'MM.dd')}"></span>
                        </td>
                        <td th:text="${#numbers.formatInteger(r['TOTAL_PRICE'],3,'COMMA')} + '원'"></td>
                        <td>
                            <form th:action="@{/admin/reservation/checkin}" method="post" onsubmit="return confirm('체크인 처리하시겠습니까?')">
                                <input type="hidden" name="reservationId" th:value="${r['RESERVATION_ID']}">
                                <button type="submit" class="btn btn-success">체크인</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="section-card">
        <div class="section-header">
            <h3>🛌 현재 투숙중인 객실</h3>
        </div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>예약번호</th>
                        <th>예약자</th>
                        <th>객실</th>
                        <th>체크아웃 예정</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${stayList}">
                        <td th:text="${r['RESERVATION_ID']}"></td>
                        <td th:text="${r['NAME']}"></td>
                        <td th:text="${r['ROOM_NAME']}"></td>
                        <td th:text="${#dates.format(r['CHECKOUT_DATE'],'yyyy-MM-dd')}"></td>
                       <td>
						    <div style="display:flex; align-items:center; gap:8px;">
						        
						        <span class="badge badge-info">투숙 중</span>
						
						        <!-- 오늘 체크아웃인 경우만 버튼 노출 -->
						        <form th:if="${#dates.format(r['CHECKOUT_DATE'],'yyyy-MM-dd') == #dates.format(#dates.createNow(),'yyyy-MM-dd')}"
						              th:action="@{/admin/reservation/checkout}" 
						              method="post"
						              onsubmit="return confirm('정말 체크아웃 처리하시겠습니까?')"
						              style="margin:0;">
						
						            <input type="hidden" name="reservationId" th:value="${r['RESERVATION_ID']}">
						            
						            <button class="btn btn-sm"
						                    style="background:#ef4444; color:white; border-radius:999px;">
						                체크아웃
						            </button>
						        </form>
						
						    </div>
						</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

<div class="text-center" style="margin-top:80px; margin-bottom:60px;">
    <a href="/final_hotel/admin/branch/dashboard" class="btn btn-dark px-4 py-2">
        관리자 메인으로 이동
    </a>
</div>

</div>

<script>
function changeStatus(status) {

    let message = "";

    if(status === "CHECKIN") {
        message = "체크인 처리하시겠습니까?";
    } else if(status === "CHECKOUT") {
        message = "체크아웃 처리하시겠습니까?";
    } else if(status === "NOSHOW") {
        message = "노쇼 처리하시겠습니까?";
    }

    if(confirm(message)) {
        location.href = "/admin/reservation/updateStatus?status=" + status;
    }

}
</script>

</body>
</html>
