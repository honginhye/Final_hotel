<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
    <title>1:1 문의하기 - CIEL HOTEL</title>
    <th:block th:fragment="link"></th:block>
    <th:block th:fragment="style">
        <style>
            .write-container { padding: 150px 0 100px; max-width: 1000px; margin: 0 auto; } /* 에디터 가로폭에 맞춰 확장 */
            .write-title { font-size: 2.2rem; font-weight: 700; text-align: center; margin-bottom: 50px; letter-spacing: -1px; }
            
            .write-form-wrap { border-top: 2px solid #1a1a1a; padding-top: 30px; }
            .form-group { margin-bottom: 25px; }
            .form-label { font-weight: 600; font-size: 0.95rem; margin-bottom: 10px; display: block; color: #333; }
            
            .form-control { 
                border-radius: 0; border: 1px solid #ddd; padding: 12px 15px; font-size: 0.95rem;
                height: 50px; transition: border-color 0.3s;
            }
            .form-control:focus { border-color: #d4af37; box-shadow: none; outline: none; }
            .form-control[readonly] { background-color: #f9f9f9; cursor: not-allowed; }
            
            /* 지점 선택창 확대 */
            select.form-control { height: 55px; padding: 0 20px; font-size: 1rem; font-weight: 500; }
            
            /* 비밀글 체크박스 스타일 */
            .secret-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; font-size: 0.9rem; }
            .secret-wrap input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #1a1a1a; }
            
            .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 50px; }
            .btn-custom { padding: 15px 50px; font-size: 1rem; border-radius: 0; transition: 0.3s; text-decoration: none; display: inline-block; text-align: center; font-weight: 600; }
            .btn-cancel { background: #fff; color: #666; border: 1px solid #ddd; }
            .btn-cancel:hover { background: #f5f5f5; }
            .btn-submit { background: #1a1a1a; color: #fff; border: 1px solid #1a1a1a; }
            .btn-submit:hover { background: #d4af37; border-color: #d4af37; }
            
            .info-text { font-size: 0.8rem; color: #888; margin-top: 5px; }
        </style>
    </th:block>
</head>
<body>

<th:block th:fragment="content">
    <div class="container write-container">
        <h2 class="write-title">1:1 문의하기</h2>

        <div class="write-form-wrap">
            <form id="qnaWriteFrm" name="qnaWriteFrm" th:action="@{/cs/qnaWriteEnd}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label class="form-label">문의 지점</label>
                    <select name="fk_hotel_id" id="fk_hotel_id" class="form-control w-100">
                        <option th:each="h : ${hotelList}" 
                                th:value="${h.HOTEL_ID}" 
                                th:text="${h.HOTEL_NAME}"
                                th:selected="${#strings.equals(hotelId, h.HOTEL_ID)}">
                        </option>
                    </select>
                    <p class="info-text">문의하실 지점을 확인해 주세요.</p>
                </div>

                <div class="form-group">
                    <label class="form-label">문의 제목</label>
                    <input type="text" name="title" id="title" class="form-control w-100" placeholder="제목을 입력해주세요.">
                </div>

                <div class="form-group">
                    <label class="form-label">작성자</label>
                    <div sec:authorize="isAuthenticated()">
                        <input type="text" name="writer_name" id="writer_name" 
                               class="form-control w-100" 
                               th:value="${#authentication.name}" readonly>
                        <p class="info-text"><i class="bi bi-info-circle"></i> 회원 계정으로 작성됩니다.</p>
                    </div>
                
                    <div sec:authorize="isAnonymous()" th:if="${session.Session_GuestDTO != null}">
                        <input type="text" name="writer_name" id="writer_name" 
                               class="form-control w-100" 
                               th:value="${session.Session_GuestDTO.guestName}" readonly>
                        <p class="info-text"><i class="bi bi-info-circle"></i> 비회원 예약 정보로 작성됩니다.</p>
                    </div>
                
                    <div sec:authorize="isAnonymous()" th:if="${session.Session_GuestDTO == null}">
                        <input type="text" name="writer_name" id="writer_name" 
                               class="form-control w-100" 
                               placeholder="성함을 입력해주세요.">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">문의 내용</label>
                    <textarea name="content" id="content" style="width: 100%; height: 500px;"></textarea>
                </div>

                <div class="form-group">
                    <label class="secret-wrap">
                        <input type="checkbox" name="is_secret" id="is_secret" value="Y"> 
                        <span>비밀글로 문의하기</span>
                    </label>
                    <p class="info-text">비밀글은 작성자와 관리자만 볼 수 있습니다.</p>
                </div>

                <div class="btn-group">
                    <a th:href="@{/cs/list(hotelId=${hotelId})}" class="btn-custom btn-cancel">취소</a>
                    <button type="button" class="btn-custom btn-submit" id="btnWrite">등록하기</button>
                </div>
            </form>
        </div>
    </div>
</th:block>

<th:block th:fragment="script">
    <script type="text/javascript" th:src="@{/smarteditor/js/HuskyEZCreator.js}" charset="utf-8"></script>
    
    <script th:inline="javascript">
        $(document).ready(function() {
            // ==== 스마트 에디터 초기화 ====
            var obj = [];
            const sSkinURI = /*[[@{/smarteditor/SmartEditor2Skin.html}]]*/ "";
               
            nhn.husky.EZCreator.createInIFrame({
                oAppRef: obj,
                elPlaceHolder: "content", 
                sSkinURI: sSkinURI,
                htParams : {
                    bUseToolbar : true,            
                    bUseVerticalResizer : true,    
                    bUseModeChanger : true,
                },
                fCreator: "createInIFrame"
            });

            // 등록 버튼 클릭 이벤트
            $("#btnWrite").click(function() {
                // 에디터 내용을 textarea에 반영
                obj.getById["content"].exec("UPDATE_CONTENTS_FIELD", []);

                const title = $("#title").val().trim();
                const writer = $("#writer_name").val().trim();
                const content_val = $("#content").val();

                // 유효성 검사
                if(title == "") { alert("제목을 입력하세요."); $("#title").focus(); return; }
                if(writer == "") { alert("작성자를 입력하세요."); $("#writer_name").focus(); return; }

                // 스마트에디터 빈값 체크 (태그 제외)
                let check_val = content_val.replace(/<[^>]*>?/g, '').replace(/\s/gi, '').replace(/&nbsp;/gi, '');
                if(check_val.length == 0) {
                    alert("내용을 입력하세요!");
                    return;
                }

                // [추가] 비밀글 체크박스 처리 (체크 안됐을 때 'N' 전송)
                if(!$("#is_secret").is(":checked")) {
                    $('<input>').attr({
                        type: 'hidden',
                        name: 'is_secret',
                        value: 'N'
                    }).appendTo('#qnaWriteFrm');
                    $("#is_secret").removeAttr("name");
                }

                if(confirm("이 내용으로 문의를 등록하시겠습니까?")) {
                    $("#qnaWriteFrm").submit();
                }
            });
        });
    </script>
</th:block>
</body>
</html>
