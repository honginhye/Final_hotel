<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
    <title>1:1 문의 수정 - CIEL HOTEL</title>
    
    <th:block th:fragment="link">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </th:block>
    
    <th:block th:fragment="style">
        <style>
            .write-container { padding: 150px 0 100px; max-width: 1000px; margin: 0 auto; }
            .write-title { font-size: 2.2rem; font-weight: 700; text-align: center; margin-bottom: 10px; letter-spacing: -1px; }
            .write-subtitle { text-align: center; color: #888; margin-bottom: 50px; font-size: 0.95rem; }
            
            .form-wrap { border-top: 2px solid #1a1a1a; padding-top: 30px; }
            .form-group { margin-bottom: 25px; }
            .form-label { display: block; font-weight: 600; color: #333; margin-bottom: 10px; font-size: 0.9rem; }
            
            .form-control { width: 100%; border: 1px solid #ddd; padding: 12px 15px; border-radius: 0; transition: 0.3s; font-size: 0.95rem; }
            .form-control:focus { border-color: #d4af37; outline: none; }
            
            .form-control:disabled { 
                background-color: #f5f5f5; color: #666; cursor: not-allowed; 
                height: 50px; padding: 10px 15px; appearance: none;
            }
            
            .btn-group-center { display: flex; justify-content: center; gap: 15px; margin-top: 50px; }
            .btn-custom { padding: 15px 50px; font-size: 1rem; cursor: pointer; border: 1px solid #ddd; background: #fff; font-weight: 600; transition: 0.3s; }
            .btn-submit { background: #1a1a1a; color: #fff !important; border: 1px solid #1a1a1a; }
            .btn-submit:hover { background: #d4af37; border-color: #d4af37; }

            .checkbox-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.95rem; color: #333; }
            .checkbox-wrap input[type="checkbox"] { width: 18px; height: 18px; accent-color: #1a1a1a; }
        </style>
    </th:block>
</head>
<body>

<th:block th:fragment="content">
    <div class="container write-container">
        <h2 class="write-title">문의 수정</h2>
        <p class="write-subtitle">작성하신 문의 내용을 수정하실 수 있습니다.</p>

        <div class="form-wrap">
            <form th:action="@{/cs/qnaUpdateEnd}" method="post" id="qnaUpdateFrm" name="qnaUpdateFrm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                <input type="hidden" name="qnaId" th:value="${qna['QNA_ID']}">
                <input type="hidden" name="fk_hotel_id" th:value="${qna['FK_HOTEL_ID']}">
                
                <div class="form-group">
                    <label class="form-label">문의 지점 (변경 불가)</label>
                    <select class="form-control" disabled>
                        <option th:each="h : ${hotelList}" 
                                th:value="${h.HOTEL_ID}" 
                                th:text="${h.HOTEL_NAME}"
                                th:selected="${#strings.equals(h.HOTEL_ID, qna['FK_HOTEL_ID'])}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">문의 제목</label>
                    <input type="text" name="title" class="form-control" th:value="${qna['TITLE']}">
                </div>

                <div class="form-group">
                    <label class="form-label">문의 내용</label>
                    <textarea name="content" id="content" style="width: 100%; height: 500px;" th:text="${qna['CONTENT']}"></textarea>
                </div>

                <div class="form-group">
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="is_secret_check" value="Y" 
                               th:checked="${qna['IS_SECRET'] == '1' || qna['IS_SECRET'] == 'Y'}">
                        <span>비밀글로 문의하기</span>
                    </label>
                </div>

                <div class="btn-group-center">
                    <button type="button" class="btn-custom btn-cancel" onclick="history.back()">취소</button>
                    <button type="button" class="btn-custom btn-submit" id="btnUpdate">수정 완료</button>
                </div>
            </form>
        </div>
    </div>
</th:block>

<th:block th:fragment="script">
    <script type="text/javascript" th:src="@{/smarteditor/js/HuskyEZCreator.js}" charset="utf-8"></script>
    
    <script th:inline="javascript">
        $(document).ready(function() {
            var obj = [];
            const sSkinURI = /*[[@{/smarteditor/SmartEditor2Skin.html}]]*/ "";
               
            nhn.husky.EZCreator.createInIFrame({
                oAppRef: obj,
                elPlaceHolder: "content",
                sSkinURI: sSkinURI,
                htParams : {
                    bUseToolbar : true,            
                    bUseVerticalResizer : true,    
                    bUseModeChanger : true,
                },
                fCreator: "createInIFrame"
            });

            $("#btnUpdate").click(function() {
                // 에디터 내용 반영
                obj.getById["content"].exec("UPDATE_CONTENTS_FIELD", []);

                const title = $('input[name="title"]').val().trim();
                const content = $('#content').val();

                if(!title) {
                    alert("제목을 입력하세요!");
                    $('input[name="title"]').focus();
                    return;
                }

                // 스마트에디터 빈값 체크
                let check_val = content.replace(/<[^>]*>?/g, '').replace(/\s/gi, '').replace(/&nbsp;/gi, '');
                if(check_val.length == 0) {
                    alert("내용을 입력하세요!");
                    return;
                }

                // [중요] 비밀글 체크박스 처리 (Oracle ORA-17004 방지)
                if(!$("#is_secret_check").is(":checked")) {
                    $('<input>').attr({
                        type: 'hidden',
                        name: 'is_secret',
                        value: 'N'
                    }).appendTo('#qnaUpdateFrm');
                } else {
                    $('<input>').attr({
                        type: 'hidden',
                        name: 'is_secret',
                        value: 'Y'
                    }).appendTo('#qnaUpdateFrm');
                }

                if(confirm("문의 내용을 수정하시겠습니까?")) {
                    $("#qnaUpdateFrm").submit();
                }
            });
        });
    </script>
</th:block>
</body>
</html>
