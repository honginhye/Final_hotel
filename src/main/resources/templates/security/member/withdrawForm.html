<!DOCTYPE html>
<html th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::div#wrap})}"
      lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>회원탈퇴</title>

  <style>
    .withdraw-wrap{
      max-width: 760px;
      margin: 160px auto 100px auto;
      padding: 0 16px;
    }

    .withdraw-card{
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 32px 28px;
    }

    .withdraw-title{
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #111;
    }

    .withdraw-desc{
      font-size: 15px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .warn-box{
      border: 1px solid #f0d8d8;
      background: #fff8f8;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 24px;
    }

    .warn-box h3{
      font-size: 16px;
      margin: 0 0 10px 0;
      color: #b64545;
    }

    .warn-box ul{
      margin: 0;
      padding-left: 18px;
      color: #444;
      line-height: 1.8;
      font-size: 14px;
    }

    .member-box{
      border: 1px solid #ececec;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 24px;
      background: #fafafa;
    }

    .member-row{
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .member-row:last-child{
      margin-bottom: 0;
    }

    .member-row .k{
      width: 90px;
      color: #777;
      flex-shrink: 0;
    }

    .member-row .v{
      font-weight: 700;
      color: #111;
    }

    .agree-row{
      margin-bottom: 24px;
      font-size: 14px;
      color: #222;
    }

    .btn-area{
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 140px;
      height: 46px;
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: #111;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-dark{
      background: #111;
      border-color: #111;
      color: #fff;
    }
  </style>

  <script th:inline="javascript">
    function withdrawMember() {

      const agree = document.getElementById("agreeWithdraw");

      if (!agree.checked) {
        alert("회원탈퇴 안내사항에 동의해 주세요.");
        return;
      }

      if (!confirm("정말 회원탈퇴를 진행하시겠습니까?")) {
        return;
      }

      const csrfToken  = document.querySelector("meta[name='_csrf']").getAttribute("content");
      const csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
      const ctxPath    = /*[[@{/}]]*/ "/";

      $.ajax({
        url: ctxPath + "api/auth/member/withdraw",
        type: "POST",
        data: {},
        beforeSend: function(xhr) {
          xhr.setRequestHeader(csrfHeader, csrfToken);
        },
        success: function(json) {

          if (json.success) {
            alert(json.message);
            location.href = ctxPath + "index";
          }
          else {
            alert(json.message || "회원탈퇴 처리에 실패했습니다.");
          }
        },
        error: function(request, status, error) {
          let msg = "회원탈퇴 처리 중 오류가 발생했습니다.";

          try {
            const json = JSON.parse(request.responseText);
            if (json.message) {
              msg = json.message;
            }
          } catch(e) {}

          alert(msg);
        }
      });
    }
  </script>
</head>

<body>
<div id="wrap" class="withdraw-wrap">
  <div class="withdraw-card">
    <h1 class="withdraw-title">회원탈퇴</h1>

    <div class="withdraw-desc">
      탈퇴를 진행하면 현재 계정은 비활성화되며, 같은 계정으로 일반 로그인이 불가능해집니다.
    </div>

    <div class="warn-box">
      <h3>탈퇴 전 꼭 확인해 주세요</h3>
      <ul>
        <li>회원 정보는 즉시 비활성화 처리됩니다.</li>
        <li>객실예약, 다이닝예약, 셔틀예약, 결제, 로그인기록 등 기존 내역은 삭제되지 않습니다.</li>
        <li>탈퇴 후에는 현재 계정으로 다시 로그인할 수 없습니다.</li>
      </ul>
    </div>

    <div class="member-box">
      <div class="member-row">
        <div class="k">회원번호</div>
        <div class="v" th:text="${memberDto.memberNo}">1</div>
      </div>
      <div class="member-row">
        <div class="k">회원아이디</div>
        <div class="v" th:text="${memberDto.memberid}">hong123</div>
      </div>
      <div class="member-row">
        <div class="k">회원명</div>
        <div class="v" th:text="${memberDto.name}">홍길동</div>
      </div>
    </div>

    <div class="agree-row">
      <label>
        <input type="checkbox" id="agreeWithdraw">
        안내사항을 모두 확인했으며 회원탈퇴에 동의합니다.
      </label>
    </div>

    <div class="btn-area">
      <a class="btn" th:href="@{/security/member/mypage}">취소</a>
      <button type="button" class="btn btn-dark" onclick="withdrawMember()">회원탈퇴 진행</button>
    </div>
  </div>
</div>
</body>
</html>
