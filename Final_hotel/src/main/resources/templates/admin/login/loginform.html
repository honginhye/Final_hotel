<!DOCTYPE html>
<html th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::div.container})}"
      lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>관리자 로그인</title>

<link rel="stylesheet" href="">

<style>
:root{
  --bg:#fff;
  --line:#e9e9e9;
  --text:#111;
  --muted:#6f6f6f;
  --danger:#c94b4b;
}

/* 페이지 전체 여백/정렬 */
.login-bg{
  background: var(--bg);
  min-height: calc(100vh - 40px);
  display:flex;
  justify-content:center;
  padding: 110px 16px 110px;
}

/* 바깥 컨테이너(흰 여백 확보) */
.wrap{
  width: 920px;
  max-width: 100%;
}

/* 상단 타이틀 */
.header{
  text-align:center;
  margin: 0 0 42px;
}
.header h1{
  margin:0;
  font-size: 44px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
}
.header p{
  margin: 12px 0 0;
  font-size: 14px;
  color: var(--muted);
}

/* 카드: 중앙 정렬 + 내부 좌우 패딩 확보 */
.card{
  width: 680px;
  max-width: 100%;
  margin: 0 auto;
  background:#fff;
  border: 1px solid var(--line);
  border-radius: 10px;

  /* ✅ 여기서 자연스러움 결정: 좌우 패딩 */
  padding: 34px 40px 30px;
}

/* form 영역은 카드 안에서 100% 사용 (고정폭 제거) */
.body{
  width: 100%;
  margin: 0;
  padding: 0;
}

/* 라벨 */
.label{
  margin: 0 0 10px;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
}

/* 입력창 */
.field{ margin-bottom: 16px; }

.input{
  width:100%;
  height: 56px;
  padding: 0 18px;
  border: 1px solid var(--line);
  border-radius: 6px;
  outline:none;
  background:#fff;
  font-size: 15px;
  color: var(--text);
}
.input:focus{
  border-color:#111;
}

/* 보안/링크 줄 */
.rowline{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin: 10px 0 18px;
  gap: 12px;
}

.secure{
  display:flex;
  align-items:center;
  gap: 8px;
  font-size: 13px;
  color: var(--muted);
}
.lock{
  width:22px;
  height:22px;
  display:grid;
  place-items:center;
  border-radius:999px;
  background:#f4f4f4;
  border:1px solid var(--line);
}

/* 링크(회원 로그인) */
.user-link{
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
  text-decoration:none;
}
.user-link:hover{
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* 버튼 */
.btnx{
  width:100%;
  height: 58px;
  border:0;
  border-radius: 6px;
  background:#111;
  color:#fff;
  font-size: 16px;
  font-weight: 800;
  cursor:pointer;
}
.btnx:active{ transform: translateY(1px); }

/* 하단 링크 */
.links{
  margin-top: 24px;
  padding-bottom: 6px;
  display:flex;
  justify-content:center;
  gap: 14px;
  font-size: 14px;
  color: var(--muted);
}
.links a{
  color: var(--muted);
  text-decoration:none;
}
.links a:hover{
  color: var(--text);
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* 서버 메시지/에러 박스: 카드 폭에 맞추되 카드 안쪽 패딩과 맞춤 */
.server-msg, .error{
  width: 100%;
  margin: 0 0 16px;
  background: #fff1f1;
  color: #8f2b2b;
  border: 1px solid rgba(201,75,75,.25);
  border-radius: 8px;
  padding: 12px 12px;
  font-size: 13px;
  line-height: 1.45;
}

.error{ display:none; margin-top: 16px; }
.error.show{ display:block; }

/* 모바일 */
@media (max-width: 520px){
  .login-bg{
    padding-top: 86px;
    padding-bottom: 90px;
  }
  .header h1{
    font-size: 36px;
  }
  .card{
    padding: 28px 18px 26px;  /* 모바일은 좌우 패딩 줄이기 */
  }
}
</style>

<script th:inline="javascript">
/*<![CDATA[*/

$(document).ready(function(){

  // 엔터키로 로그인 submit
  $("#passwd").keydown(function(event){
    if(event.keyCode == 13){
      $("#adminLoginFrm").submit();
    }
  });

  // 간단 유효성
  $("#adminLoginFrm").submit(function(e){

    $("#err-admin").removeClass("show").text("");

    const adminid = $.trim($("#adminid").val());
    const passwd  = $.trim($("#passwd").val());

    if(adminid === ""){
      e.preventDefault();
      $("#err-admin").text("관리자 아이디를 입력하세요.").addClass("show");
      $("#adminid").focus();
      return false;
    }

    if(passwd === ""){
      e.preventDefault();
      $("#err-admin").text("비밀번호를 입력하세요.").addClass("show");
      $("#passwd").focus();
      return false;
    }

    // 성공 시: /admin/loginEnd 로 POST (Spring Security가 처리)
    return true;
  });

});

/*]]>*/
</script>
</head>

<body>
<div class="container">
  <div class="login-bg">
    <div class="wrap">

      <!-- 상단 타이틀(회원 로그인 페이지와 동일 톤) -->
      <div class="header">
        <h1>관리자 로그인</h1>
        <p>HQ / BRANCH 계정으로 로그인합니다.</p>
      </div>

      <section class="card" aria-label="관리자 로그인 카드">
        <div class="body">

          <!-- Controller에서 request.setAttribute("msg", msg); 로 내려주는 메시지 -->
          <div class="server-msg"
               th:if="${msg != null and #strings.length(msg) > 0}"
               th:text="${msg}"></div>

          <form id="adminLoginFrm"
                method="post"
                th:action="@{/admin/loginEnd}">

            <div class="field">
              <div class="label">관리자 아이디</div>
              <input class="input"
                     type="text"
                     id="adminid"
                     name="adminid"
                     autocomplete="username"
                     placeholder="관리자 아이디" />
            </div>

            <div class="field">
              <div class="label">비밀번호</div>
              <input class="input"
                     type="password"
                     id="passwd"
                     name="passwd"
                     autocomplete="current-password"
                     placeholder="비밀번호" />
            </div>

            <div class="rowline">
              <div class="secure" title="보안 로그인">
                <span class="lock">🔒</span>
                <span>보안</span>
              </div>

              <!-- 회원 로그인으로 이동 -->
              <a class="user-link" th:href="@{/security/login}">회원 로그인 →</a>
            </div>

            <button class="btnx" type="submit">로그인</button>

            <div class="error" id="err-admin"></div>

            <div class="links">
              <a th:href="@{/index}">메인으로</a>
            </div>

          </form>

        </div>
      </section>

    </div>
  </div>
</div>
</body>
</html>
