<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
    <meta charset="UTF-8">
    <title>RESERVATION | [[${dining.name}]]</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/main.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet">

    <style th:fragment="style">
        :root {
            --hotel-gold: #9d815d;
            --hotel-dark: #222222;
        }

        body { background-color: #f8f9fa; font-family: 'Noto Serif KR', serif; }

        .hero-image {
            width: 100%; height: 400px;
            background-size: cover; background-position: center;
            position: relative;
        }
        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
        }

        .reserve-container { 
            max-width: 1100px; margin: -100px auto 100px; 
            background: white; padding: 60px; 
            position: relative; z-index: 10; 
            border-radius: 5px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .gold-text { color: var(--hotel-gold); font-weight: bold; letter-spacing: 3px; text-transform: uppercase; font-size: 0.9rem; }

        #calendar { border: 1px solid #eee; padding: 15px; background: #fff; margin-bottom: 30px; }
        .fc-toolbar-title { font-size: 1.2rem !important; font-weight: 700; color: #333; }
        .fc-button-primary { background-color: var(--hotel-dark) !important; border: none !important; border-radius: 0 !important; }

        .time-slot-group h5 {
            font-size: 1rem; font-weight: 600; margin-top: 1.5rem; color: var(--hotel-gold);
            border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 15px;
        }
        
        .btn-check { display: none; }
        .btn-outline-time {
            border: 1px solid #ddd; color: #666; padding: 12px 0; font-size: 0.85rem;
            background-color: #fff; cursor: pointer; transition: all 0.2s; border-radius: 0;
            display: flex; justify-content: center; align-items: center;
        }
        .btn-check:checked + .btn-outline-time {
            background-color: var(--hotel-gold) !important; border-color: var(--hotel-gold) !important; color: #fff !important; font-weight: bold;
        }
        .btn-check:disabled + .btn-outline-time {
            background-color: #f2f2f2 !important; border-color: #eee !important; color: #ccc !important;
            cursor: not-allowed; text-decoration: line-through;
        }

        .form-label { font-weight: 600; color: #444; margin-bottom: 10px; display: block; font-size: 0.9rem; }
        .form-control { border-radius: 0; border: 1px solid #ddd; padding: 12px; font-size: 0.95rem; }
        .form-control:focus { border-color: var(--hotel-gold); box-shadow: none; }

        .terms-box {
            background: #f9f9f9; border: 1px solid #eee; padding: 15px;
            height: 120px; overflow-y: scroll; font-size: 0.85rem; color: #777; line-height: 1.6;
            margin-bottom: 10px;
        }

        .btn-reserve-submit {
            background-color: var(--hotel-gold); color: white !important;
            border-radius: 0; padding: 20px; font-size: 1.1rem; font-weight: bold;
            transition: 0.3s; border: none; letter-spacing: 2px;
        }
        .btn-reserve-submit:hover { background-color: #846d4f; }
        .btn-reserve-submit:disabled { background-color: #ccc; cursor: not-allowed; }

        .section-title { font-weight: 500; border-left: 4px solid var(--hotel-gold); padding-left: 15px; margin-bottom: 25px; }
    </style>
</head>

<body>
    <div th:fragment="content">
        <div class="hero-image" th:style="|background-image: url('@{/images/dining/}${dining.main_img}');|">
            <div class="hero-overlay"></div>
        </div>

        <div class="container reserve-container">
            <div class="text-center mb-5">
                <span class="gold-text">DINING RESERVATION</span>
                <h1 class="display-4 mt-2" th:text="${dining.name}">레스토랑 이름</h1>
                <hr style="width: 60px; border-top: 2px solid var(--hotel-gold); margin: 20px auto;">
            </div>

            <form id="resForm" th:action="@{/dining/reserve/confirm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="diningId" th:value="${dining.dining_id}">
                <input type="hidden" name="fkHotelId" th:value="${dining.fk_hotel_id}">

                <div class="row">
                    <div class="col-lg-7">
                        <h4 class="section-title">날짜 선택</h4>
                        <div id='calendar' class="shadow-sm"></div>

                        <h4 class="section-title mt-5">추가 요청사항</h4>
                        <div class="mb-4">
                            <textarea name="specialRequests" class="form-control" rows="4" 
                                      placeholder="알레르기 정보나 좌석 관련 요청사항이 있으시면 입력해 주세요."></textarea>
                        </div>

                        <h4 class="section-title mt-5">이용약관 동의</h4>
                        <div class="terms-box">
                            [예약 규정 안내]<br>
                            1. 예약 시간 15분이 경과하면 예약이 자동 취소될 수 있습니다.<br>
                            2. 당일 취소 및 No-Show 발생 시 향후 이용에 제한이 있을 수 있습니다.<br>
                            회사는 예약 서비스 제공을 위해 성함, 연락처 등의 개인정보를 수집하며, 이는 예약 확인 및 안내 목적으로만 사용됩니다.
                        </div>
                        <div class="custom-control custom-checkbox mb-4">
                            <input type="checkbox" class="custom-control-input" id="agreeTerms" required>
                            <label class="custom-control-label" for="agreeTerms" style="margin-left:10px;">위의 예약 규정 및 개인정보 수집 이용에 동의합니다. (필수)</label>
                        </div>
                    </div>

                    <div class="col-lg-5 px-lg-4">
                        <h4 class="section-title mt-4 mt-lg-0">예약 세부 사항</h4>
                        
                        <div class="mb-4">
                            <label class="form-label">RESERVATION DATE</label>
                            <input type="text" id="selectedDate" name="resDate" class="form-control bg-light" readonly placeholder="달력에서 날짜를 선택해 주세요.">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">RESERVATION TIME</label>
                            
                            <div th:if="${#lists.isEmpty(lunchSlots) and #lists.isEmpty(dinnerSlots)}" class="alert alert-light text-center">
                                <p class="mb-0">선택 가능한 예약 시간이 없습니다.</p>
                            </div>
                            
                            <div class="time-slot-group" th:if="${not #lists.isEmpty(lunchSlots)}">
                                <h5>LUNCH</h5>
                                <div class="row row-cols-3 g-2">
                                    <div th:each="time : ${lunchSlots}" class="col mb-2">
                                        <input type="radio" class="btn-check" name="resTime" th:id="${'lunch_' + time}" th:value="${time}" 
                                               th:disabled="${reservedSlots != null && reservedSlots.contains(time)}" required>
                                        <label class="btn btn-outline-time w-100" th:for="${'lunch_' + time}" th:text="${time}">12:00</label>
                                    </div>
                                </div>
                            </div>

                            <div class="time-slot-group" th:if="${not #lists.isEmpty(dinnerSlots)}">
                                <h5>DINNER</h5>
                                <div class="row row-cols-3 g-2">
                                    <div th:each="time : ${dinnerSlots}" class="col mb-2">
                                        <input type="radio" class="btn-check" name="resTime" th:id="${'dinner_' + time}" th:value="${time}" 
                                               th:disabled="${reservedSlots != null && reservedSlots.contains(time)}" required>
                                        <label class="btn btn-outline-time w-100" th:for="${'dinner_' + time}" th:text="${time}">18:00</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">GUESTS</label>
                            <div class="row g-2 text-center">
                                <div class="col-4">
                                    <small class="text-muted mb-1 d-block">성인</small>
                                    <input type="number" name="adultCount" class="form-control text-center" value="2" min="1">
                                </div>
                                <div class="col-4">
                                    <small class="text-muted mb-1 d-block">어린이</small>
                                    <input type="number" name="childCount" class="form-control text-center" value="0" min="0">
                                </div>
                                <div class="col-4">
                                    <small class="text-muted mb-1 d-block">유아</small>
                                    <input type="number" name="infantCount" class="form-control text-center" value="0" min="0">
                                </div>
                            </div>
                        </div>

                        <div class="pt-4 border-top mt-4">
                            <div class="row g-2 mb-2">
                                <div class="form-group col-6">
                                    <label class="form-label">NAME</label>
                                    <input type="text" name="guestName" class="form-control" th:value="${memberInfo != null ? memberInfo.name : ''}" required>
                                </div>
                                <div class="form-group col-6">
                                    <label class="form-label">PHONE</label>
                                    <input type="text" name="guestPhone" class="form-control" th:value="${memberInfo != null ? memberInfo.mobile : ''}" required>
                                </div>
                            </div>
                            <div class="form-group mb-2">
                                <label class="form-label">EMAIL</label>
                                <input type="email" name="guestEmail" class="form-control" th:value="${memberInfo != null ? memberInfo.email : ''}" required>
                            </div>
                            <div class="form-group mb-2" th:if="${memberInfo == null}">
                                <label class="form-label">PASSWORD (4 DIGITS)</label>
                                <input type="password" name="resPassword" class="form-control" maxlength="4" placeholder="조회용 비밀번호" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-reserve-submit w-100 mt-4 shadow" id="btnSubmit" disabled>
                            RESERVATION
                        </button>
                    </div> </div> </form>
        </div> </div> <script th:fragment="script" src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script th:fragment="script" th:inline="javascript">
        $(document).ready(function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                selectable: true,
                dateClick: function(info) {
                    var today = new Date();
                    today.setHours(0,0,0,0);
                    var clickedDate = new Date(info.dateStr);

                    if (clickedDate < today) {
                        alert("지난 날짜는 예약이 불가합니다.");
                        return;
                    }
                    $('#selectedDate').val(info.dateStr);
                    
                    // 날짜 선택 시 해당 날짜의 예약 가능 시간을 가져오는 로직이 필요하다면 AJAX 추가 가능
                    checkFormValidity();
                }
            });
            calendar.render();

            function checkFormValidity() {
                var isDateSelected = $('#selectedDate').val() !== "";
                var isTermsAgreed = $('#agreeTerms').is(':checked');
                // 시간 선택 여부 체크 (라디오 버튼)
                var isTimeSelected = $('input[name="resTime"]:checked').length > 0;
                
                if(isDateSelected && isTermsAgreed && isTimeSelected) {
                    $('#btnSubmit').prop('disabled', false);
                } else {
                    $('#btnSubmit').prop('disabled', true);
                }
            }

            $('#agreeTerms, input[name="resTime"]').on('change', function() {
                checkFormValidity();
            });
        });
    </script>
</body>
</html>
