<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
    <meta charset="UTF-8">
    <title>예약 완료 - 호텔 다이닝</title>

    <th:block th:fragment="link"></th:block>

    <th:block th:fragment="style">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap');
            
            #mycontent { background-color: #f8f9fa; padding-bottom: 100px; padding-top: 160px !important;}
            
            .success-container { 
                max-width: 800px; margin: 60px auto; 
                background: white; padding: 60px; 
                border-radius: 0; text-align: center;
                box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            }
            
            .gold-text { color: #9d815d; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
            
            .res-info-box { 
                background: #fdfaf5; padding: 30px; 
                margin: 30px 0; border: 1px solid #eee; 
            }
            .res-label { font-size: 0.85rem; color: #888; letter-spacing: 1px; }
            .res-number { 
                display: block; font-size: 2rem; color: #333; 
                font-family: 'Noto Serif KR', serif; margin-top: 5px; 
            }

            .detail-table { width: 100%; max-width: 500px; margin: 30px auto; border-top: 2px solid #9d815d; }
            .detail-table th { padding: 15px; color: #888; font-weight: 400; text-align: left; border-bottom: 1px solid #eee; width: 120px; }
            .detail-table td { padding: 15px; color: #333; text-align: right; border-bottom: 1px solid #eee; font-weight: 500; }

            .btn-gold { 
                background-color: #9d815d; color: white !important; 
                border-radius: 0; padding: 15px 40px; font-size: 1rem; 
                transition: 0.3s; text-decoration: none; display: inline-block;
                margin: 10px; border: none;
            }
            .btn-gold:hover { background-color: #846d4f; text-decoration: none; }
            
            .btn-list { 
                border: 1px solid #9d815d; color: #9d815d !important; 
                border-radius: 0; padding: 15px 40px; font-size: 1rem;
                transition: 0.3s; text-decoration: none; display: inline-block;
                margin: 10px;
            }
            .btn-list:hover { background: #fdfaf5; text-decoration: none; }
        </style>
    </th:block>
</head>

<body>
    <div th:fragment="content">
        <div id="mycontent">
            <div class="container success-container">
                
                <div class="text-center mb-4">
                    <span class="gold-text">RESERVATION SUCCESS</span>
                    <h1 class="display-4 mt-2" style="font-family: 'Noto Serif KR', serif; font-size: 2.5rem;">예약이 완료되었습니다</h1>
                    <hr style="width: 50px; border-top: 2px solid #9d815d; margin: 25px auto;">
                </div>

                <p style="color: #666; font-size: 1.1rem;">
                    <strong th:text="${res.guestName}">고객</strong>님, 감사합니다.<br>
                    선택하신 다이닝 예약이 확정되었습니다.
                </p>

                <div class="res-info-box">
                    <span class="res-label">BOOKING NUMBER</span>
                    <strong class="res-number" th:text="${res.diningReservationId}">000000</strong>
                </div>

                <table class="detail-table">
                    <tr>
                        <th>예약 날짜</th>
                        <td th:text="${res.resDate} + ' ' + ${res.resTime}">2026-03-09 18:30</td>
                    </tr>
                    <tr>
                        <th>예약 인원</th>
                        <td>
                            성인 <span th:text="${res.adultCount}">0</span>, 
                            어린이 <span th:text="${res.childCount}">0</span>, 
                            유아 <span th:text="${res.infantCount}">0</span>
                        </td>
                    </tr>
                    <tr th:if="${res.diningName != null}">
                        <th>예약 장소</th>
                        <td th:text="${res.diningName}">레스토랑 이름</td>
                    </tr>
                </table>

                <div class="mt-5">
                    <a th:href="@{/index}" class="btn-gold">메인으로 돌아가기</a>
                    <a th:href="@{/dining/all}" class="btn-list">다이닝 목록 보기</a>
                </div>
                
            </div> </div> </div> <th:block th:fragment="script">
        <script>
            console.log("예약 완료 페이지 로드");
        </script>
    </th:block>
</body>
</html>
