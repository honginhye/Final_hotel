<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">

<head>
    <title>DINING</title>

    <link rel="stylesheet" href="">

    <style th:fragment="css">
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap');
        
        #mycontent { background-color: #fff; padding-bottom: 100px; }
        .dining-header {
            margin-top: 60px; margin-bottom: 40px; text-align: center;
        }
        .dining-header h2 {
            font-size: 2.5rem; letter-spacing: 8px; font-weight: 300; color: #1a1a1a;
        }

        /* 필터 버튼 스타일 */
        .filter-wrap {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 40px;
        }
        .btn-filter {
            border: 1px solid #ddd; background: #fff; padding: 10px 35px;
            border-radius: 30px; font-size: 0.95rem; color: #555;
            transition: all 0.3s; text-decoration: none !important;
        }
        .btn-filter:hover, .btn-filter.active {
            background: #9d815d; /* 호텔 상세와 통일감 있는 골드톤 */
            color: #fff; border-color: #9d815d;
        }

        /* 호텔 선택 셀렉트 박스 */
        .hotel-select-wrap {
            display: flex; justify-content: flex-end; margin-bottom: 30px;
        }
        .custom-select-hotel {
            width: 220px; height: 45px; border-radius: 0; border: 1px solid #ccc; font-family: 'Noto Serif KR', serif;
        }

        /* 다이닝 카드 스타일 */
        .dining-card-link {
            display: block; text-decoration: none !important; color: inherit !important; margin-bottom: 60px;
        }
        
        .img-wrapper {
            position: relative; width: 100%; height: 350px; overflow: hidden;
            background-color: #f4f4f4; margin-bottom: 20px;
        }
        .img-wrapper img {
            width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease;
        }
        .dining-card-link:hover img {
            transform: scale(1.08);
        }

        /* 배지 스타일 */
        .badge-container {
            display: flex; gap: 8px; margin-bottom: 15px;
        }
        .badge-hotel {
            background: #1a1a1a; color: #fff; font-size: 0.7rem;
            padding: 4px 10px; font-weight: 500;
        }
        .badge-type {
            background: #fff; color: #9d815d; font-size: 0.7rem;
            padding: 3px 10px; border: 1px solid #9d815d; font-weight: 500;
        }

        .res-name {
            font-size: 1.6rem; margin-bottom: 15px;
            font-weight: 400; color: #111;
        }
        .info-row {
            display: flex; margin-bottom: 5px; font-size: 0.9rem;
        }
        .info-label {
            width: 70px; color: #999;
        }
        .info-content {
            color: #666;
        }

        .no-data {
            padding: 100px 0; text-align: center; color: #999;
        }
    </style>

    <script th:fragment="script">
        function changeHotel(hotelId) {
            // 타임리프 변수를 자바스크립트에서 쓰기 위해 선언
            const selectedType = [[${selectedType}]];
            let url = "/final_hotel/dining/all?hotel_id=" + hotelId;
            
            if(selectedType) {
                url += "&d_type=" + selectedType;
            }
            location.href = url;
        }
    </script>
</head>

<body>
    <div th:fragment="content" class="container">
        
        <div class="dining-header">
            <h2>DINING</h2>
        </div>

        <div class="filter-wrap">
            <a th:href="@{/dining/all(hotel_id=${selectedHotel})}" 
               class="btn-filter" th:classappend="${selectedType == null} ? 'active'">전체</a>
        
            <a th:href="@{/dining/all(hotel_id=${selectedHotel}, d_type='dining')}" 
               class="btn-filter" th:classappend="${selectedType == 'dining'} ? 'active'">레스토랑</a>
        
            <a th:href="@{/dining/all(hotel_id=${selectedHotel}, d_type='bar')}" 
               class="btn-filter" th:classappend="${selectedType == 'bar'} ? 'active'">라운지 & 바</a>
        </div>

        <div class="hotel-select-wrap">
            <select class="custom-select-hotel" onchange="changeHotel(this.value)">
                <option value="">전체 호텔</option>
                <option value="1" th:selected="${selectedHotel == 1}">CIEL</option>
                <option value="2" th:selected="${selectedHotel == 2}">LE CIEL</option>
            </select>
        </div>

        <div class="row" th:if="${not #lists.isEmpty(diningList)}">
            <div th:each="dining : ${diningList}" class="col-md-4">
                <a th:href="@{/dining/detail/{id}(id=${dining.dining_id})}" class="dining-card-link">
                    
                    <div class="img-wrapper shadow-sm">
                        <img th:src="@{/images/dining/{img}(img=${dining.main_img})}" 
                             th:alt="${dining.name}"
                             onerror="this.src='/final_hotel/images/dining/default_dining.jpg'">
                    </div>

                    <div class="badge-container">
                        <span class="badge-hotel" 
                              th:text="${dining.fk_hotel_id == 1 ? 'CIEL' : (dining.fk_hotel_id == 2 ? 'LE CIEL' : 'LOTTE HOTEL WORLD')}">
                        </span>
                        <span class="badge-type" 
                              th:text="${dining.d_type == 'dining' ? '레스토랑' : (dining.d_type == 'bar' ? '라운지 & 바' : dining.d_type)}">
                        </span>
                    </div>

                    <h3 class="res-name" th:text="${dining.name}">다이닝 명칭</h3>
                    
                    <div class="info-row">
                        <span class="info-label">위치</span>
                        <span class="info-content" th:text="${dining.floor}">층수</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">문의</span>
                        <span class="info-content" th:text="${dining.tel}">전화번호</span>
                    </div>
                </a>
            </div>
        </div>

        <div class="no-data" th:if="${#lists.isEmpty(diningList)}">
            <p><i class="fa-solid fa-circle-exclamation fa-2x mb-3"></i><br>
            선택하신 조건에 해당하는 다이닝 매장이 없습니다.</p>
            <a th:href="@{/dining/all}" class="btn btn-dark px-4 mt-2">전체보기</a>
        </div>

    </div>
</body>
</html>
