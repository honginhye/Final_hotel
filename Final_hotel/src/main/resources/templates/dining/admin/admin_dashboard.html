<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
    <title>관리자 예약 통합 관리 - 호텔 다이닝</title>

    <th:block th:fragment="link"></th:block>

    <th:block th:fragment="style">
        <style>
            #mycontent { padding-top: 150px !important; padding-bottom: 100px; min-height: 100vh; background: #f9f9f9; }
            .stat-card { background: #fff; border: 1px solid #e0e0e0; padding: 20px; text-align: center; transition: 0.3s; }
            .stat-card h3 { color: #9d815d; font-weight: bold; margin-bottom: 5px; }
            .stat-label { font-size: 14px; color: #777; text-transform: uppercase; }
            .search-box { background: #fff; border: 1px solid #e0e0e0; padding: 20px; margin-bottom: 30px; }
            .res-table-container { background: #fff; border: 1px solid #e0e0e0; padding: 0; }
            .table thead { background: #f4f1ee; }
            .status-badge { padding: 4px 10px; font-size: 11px; font-weight: bold; border-radius: 2px; display: inline-block; }
            .status-confirmed { background: #e3f2fd; color: #1976d2; }
            .status-visited { background: #e8f5e9; color: #2e7d32; }
            .status-noshow { background: #fafafa; color: #9e9e9e; }
            .status-canceled { background: #ffebee; color: #d32f2f; }
            .btn-admin { border: 1px solid #9d815d; color: #9d815d; background: none; padding: 3px 10px; font-size: 12px; transition: 0.2s; margin-right: 2px; }
            .btn-admin:hover { background: #9d815d; color: #fff; }
            /* 상세 모달 스타일 */
            .detail-row { display: flex; border-bottom: 1px solid #eee; padding: 10px 0; }
            .detail-label { width: 100px; font-weight: bold; color: #777; }
        </style>
    </th:block>

    <th:block th:fragment="script">
        <script th:inline="javascript">
            /*<![CDATA[*/
            $(document).ready(function() {
                const token = $("meta[name='_csrf']").attr("content");
                const header = $("meta[name='_csrf_header']").attr("content");
                $(document).ajaxSend(function(e, xhr, options) {
                    if (token && header) { xhr.setRequestHeader(header, token); }
                });
            });
        
            // 상태 변경 함수 (방문, 노쇼, 취소 공용)
            function changeStatus(resId, status) {
                const url = /*[[@{/admin/dining/updateStatus}]]*/ "/admin/dining/updateStatus";
                let msg = "";
                if (status === 'VISITED') msg = "방문 완료 처리하시겠습니까?";
                else if (status === 'NOSHOW') msg = "노쇼(No-Show) 처리하시겠습니까?";
                else if (status === 'CANCELED') msg = "예약을 취소 처리하시겠습니까?"; 
                
                if(!confirm(msg)) return;

                $.ajax({
                    url: url,
                    type: "POST",
                    data: { "resId": resId, "status": status },
                    success: function(res) {
                        if(res === "success") {
                            alert("상태가 변경되었습니다.");
                            location.href = location.href;
                        } else { alert("업데이트 실패"); }
                    },
                    error: function() { alert("서버 통신 오류"); }
                });
            }

            // 현장 예약 등록
            function submitManualRes() {
                const url = /*[[@{/admin/dining/registerManual}]]*/ "/admin/dining/registerManual";
                let formData = $('#manualResForm').serializeArray();
                formData.push({ name: "fkHotelId", value: "1" }); // 호텔 ID 1번 강제 추가

                if(!$('input[name="guestName"]').val() || !$('input[name="guestPhone"]').val()) {
                    alert("성함과 연락처는 필수입니다."); return;
                }

                if(confirm("예약을 등록하시겠습니까?")) {
                    $.ajax({
                        url: url,
                        type: "POST",
                        data: $.param(formData),
                        success: function(res) {
                            if(res === "success") {
                                alert("등록되었습니다.");
                                location.reload();
                            } else { alert("등록 실패"); }
                        },
                        error: function() { alert("서버 오류"); }
                    });
                }
            }
            
            // 상세 조회 함수
            function showDetail(resId) {
            	const url = /*[[@{/admin/dining/detail}]]*/ "/admin/dining/detail";
            	
                $.ajax({
                    url: url,
                    type: "GET",
                    data: { "resId": resId },
                    success: function(data) {
                        let html = `
                            <div class="detail-row"><div class="detail-label">예약번호</div><div>${data.diningReservationId}</div></div>
                            <div class="detail-row"><div class="detail-label">업장명</div><div>${data.diningName}</div></div>
                            <div class="detail-row"><div class="detail-label">예약자</div><div>${data.guestName}</div></div>
                            <div class="detail-row"><div class="detail-label">연락처</div><div>${data.guestPhone}</div></div>
                            <div class="detail-row"><div class="detail-label">예약일시</div><div>${data.resDate} ${data.resTime}</div></div>
                            <div class="detail-row"><div class="detail-label">인원</div><div>성인 ${data.adultCount}, 소아 ${data.childCount}, 유아 ${data.infantCount}</div></div>
                            <div class="detail-row"><div class="detail-label">상태</div><div>${data.status}</div></div>
                        `;
                        $('#detailModalBody').html(html);

                        const detailModal = new bootstrap.Modal(document.getElementById('detailModal'));
                        detailModal.show();
                    },
                    error: function() { alert("정보를 불러오지 못했습니다."); }
                });
            }

            function showManualModal() {
                new bootstrap.Modal(document.getElementById('manualResModal')).show();
            }
            /*]]>*/
        </script>
    </th:block>
</head>

<body>
    <div th:fragment="content">
        <div id="mycontent">
            <div class="container">
                <div class="mb-5 text-center">
                    <h2 style="font-family: 'Noto Serif KR', serif;">Reservation Management</h2>
                </div>

                <div class="row g-3 mb-5">
                    <div class="col-md-3"><div class="stat-card"><div class="stat-label">Total</div><h3 th:text="${counts.TOTAL}">0</h3></div></div>
                    <div class="col-md-3"><div class="stat-card" style="border-top: 3px solid #1976d2;"><div class="stat-label">Today</div><h3 th:text="${counts.TODAY_RESERVE}">0</h3></div></div>
                    <div class="col-md-3"><div class="stat-card" style="border-top: 3px solid #2e7d32;"><div class="stat-label">Visited</div><h3 th:text="${counts.VISITED}">0</h3></div></div>
                    <div class="col-md-3"><div class="stat-card" style="border-top: 3px solid #d32f2f;"><div class="stat-label">No-Show</div><h3 th:text="${counts.NOSHOW}">0</h3></div></div>
                </div>

                <div class="search-box">
                    <form th:action="@{/admin/dining/dashboard}" method="get" class="row g-2 justify-content-center">
                        <div class="col-md-4"><input type="text" name="keyword" class="form-control form-control-sm" placeholder="이름 또는 연락처" th:value="${param.keyword}"></div>
                        <div class="col-md-2">
                            <select name="status" class="form-select form-control-sm">
                                <option value="">전체 상태</option>
                                <option value="CONFIRMED" th:selected="${param.status == 'CONFIRMED'}">예약확정</option>
                                <option value="VISITED" th:selected="${param.status == 'VISITED'}">방문완료</option>
                                <option value="NOSHOW" th:selected="${param.status == 'NOSHOW'}">노쇼</option>
                                <option value="CANCELED" th:selected="${param.status == 'CANCELED'}">취소됨</option>
                            </select>
                        </div>
                        <div class="col-md-1"><button type="submit" class="btn btn-dark btn-sm w-100">조회</button></div>
                    </form>
                </div>

                <div class="res-table-container shadow-sm">
                    <table class="table table-hover align-middle text-center">
                        <thead>
                            <tr>
                                <th>No.</th><th>업장</th><th>예약자</th><th>일시</th><th>인원</th><th>상태</th><th>액션</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="res : ${resList}" style="cursor: pointer;">
                                <td th:text="${res.diningReservationId}" th:onclick="showDetail([[${res.diningReservationId}]])">1</td>
                                <td class="fw-bold" th:text="${res.diningName}" th:onclick="showDetail([[${res.diningReservationId}]])">레스토랑</td>
                                <td th:onclick="showDetail([[${res.diningReservationId}]])">
                                    <span th:text="${res.guestName}">성함</span><br><small class="text-muted" th:text="${res.guestPhone}">연락처</small>
                                </td>
                                <td th:onclick="showDetail([[${res.diningReservationId}]])">
                                    <span th:text="${res.resDate}">날짜</span><br><span th:text="${res.resTime}">시간</span>
                                </td>
                                <td th:onclick="showDetail([[${res.diningReservationId}]])">
                                    <small>성인</small> <span th:text="${res.adultCount}">0</span>
                                </td>
                                <td>
                                    <span th:if="${res.status == 'CONFIRMED'}" class="status-badge status-confirmed">예약확정</span>
                                    <span th:if="${res.status == 'VISITED'}" class="status-badge status-visited">방문완료</span>
                                    <span th:if="${res.status == 'NOSHOW'}" class="status-badge status-noshow">노쇼</span>
                                    <span th:if="${res.status == 'CANCELED'}" class="status-badge status-canceled">취소됨</span>
                                </td>
                                <td>
                                    <div th:if="${res.status == 'CONFIRMED'}">
                                        <button class="btn-admin" th:onclick="changeStatus([[${res.diningReservationId}]], 'VISITED')">방문</button>
                                        <button class="btn-admin" th:onclick="changeStatus([[${res.diningReservationId}]], 'NOSHOW')">노쇼</button>
                                        <button class="btn-admin" style="border-color: #d32f2f; color: #d32f2f;" th:onclick="changeStatus([[${res.diningReservationId}]], 'CANCELED')">취소</button>
                                    </div>
                                    <span th:unless="${res.status == 'CONFIRMED'}" class="text-muted small">-</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="text-end mb-3 mt-4 container">
            <button type="button" class="btn btn-dark" onclick="showManualModal()" style="background: #9d815d; border: none;">+ 현장 예약 등록</button>
        </div>
        
        <div class="modal fade" id="manualResModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header" style="background: #f4f1ee;">
                        <h5 class="modal-title fw-bold" style="color: #9d815d;">현장 예약 직접 등록</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="manualResForm">
                            <div class="mb-3"><label class="form-label small fw-bold">업장 선택</label>
                                <select name="diningId" class="form-select">
                                    <option value="1">DREAM</option><option value="2">LBC</option><option value="3">STAY</option><option value="4">LBLC</option>
                                </select>
                            </div>
                            <div class="mb-3"><label class="form-label small fw-bold">성함</label><input type="text" name="guestName" class="form-control" required></div>
                            <div class="mb-3"><label class="form-label small fw-bold">연락처</label><input type="tel" name="guestPhone" class="form-control" placeholder="010-0000-0000" required></div>
                            <div class="row">
                                <div class="col-md-6 mb-3"><label class="form-label small fw-bold">일자</label><input type="date" name="resDate" class="form-control" required></div>
                                <div class="col-md-6 mb-3"><label class="form-label small fw-bold">시간</label><input type="time" name="resTime" class="form-control" required></div>
                            </div>
                            <div class="row">
                                <div class="col-md-4"><label class="form-label small fw-bold">성인</label><input type="number" name="adultCount" class="form-control" value="2"></div>
                                <div class="col-md-4"><label class="form-label small fw-bold">소아</label><input type="number" name="childCount" class="form-control" value="0"></div>
                                <div class="col-md-4"><label class="form-label small fw-bold">유아</label><input type="number" name="infantCount" class="form-control" value="0"></div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button>
                        <button type="button" class="btn btn-dark btn-sm" onclick="submitManualRes()" style="background: #9d815d; border: none;">등록</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header"><h5 class="modal-title fw-bold">예약 상세 정보</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body" id="detailModalBody"> 로딩 중... </div>
                    <div class="modal-footer"><button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">닫기</button></div>
                </div>
            </div>
        </div>
        
    </div>
</body>
</html>
