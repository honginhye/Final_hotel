<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">

<head>
    <meta charset="UTF-8">
    <title th:text="${dining.name} + ' - 정보 수정'"></title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    
    <style th:fragment="style">
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap');
        body { font-family: 'Noto Serif KR', serif; color: #333; background-color: #f8f9fa; }
        
        .edit-container { max-width: 900px; margin: 50px auto; background: white; padding: 40px; border-top: 5px solid #9d815d; }
        .gold-text { color: #9d815d; font-weight: bold; letter-spacing: 2px; }
        
        .form-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .section-title { font-size: 1.25rem; font-weight: 500; border-left: 4px solid #9d815d; padding-left: 15px; margin-bottom: 20px; }
        
        .form-control { border-radius: 0; border: 1px solid #ddd; padding: 12px; }
        .form-control:focus { border-color: #9d815d; box-shadow: none; }
        
        label { font-weight: 500; color: #666; margin-bottom: 8px; }
        
        .btn-save { background-color: #9d815d; color: white; border-radius: 0; padding: 12px 40px; font-size: 1.1rem; transition: 0.3s; border: none; }
        .btn-save:hover { background-color: #846d4f; color: white; }
        .btn-cancel { border-radius: 0; padding: 12px 40px; font-size: 1.1rem; }
        
        .readonly-field { background-color: #f1f1f1 !important; cursor: not-allowed; }
    	.admin-content-wrapper { padding-top: 120px; }
    </style>
</head>
<body>

    <div th:fragment="content">
    	<div class="admin-content-wrapper">
	        <div class="container edit-container shadow">
	            
	            <div class="text-center mb-5">
	                <span class="gold-text">ADMIN PAGE</span>
	                <h2 class="mt-2" th:text="${dining.name} + ' 정보 수정'">매장 정보 수정</h2>
	                <p class="text-muted">위치 정보를 제외한 이용 시간 및 추가 정보를 수정합니다.</p>
	            </div>
	
	            <form th:action="@{/editdetail}" method="post">
	            	<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
	                <input type="hidden" name="dining_id" th:value="${dining.dining_id}">
	
	                <div class="form-section">
	                    <h4 class="section-title">기본 정보</h4>
	                    <div class="row">
	                        <div class="col-md-6 form-group">
	                            <label>매장 이름</label>
	                            <input type="text" class="form-control readonly-field" th:value="${dining.name}" readonly>
	                        </div>
	                        <div class="col-md-6 form-group">
	                            <label>위치 (층수)</label>
	                            <input type="text" class="form-control readonly-field" th:value="${dining.floor}" readonly>
	                            <small class="text-muted">위치 정보는 관리자 문의를 통해 수정 가능합니다.</small>
	                        </div>
	                    </div>
	                    
	                    <div class="form-group mt-3">
	                        <label for="tel">전화번호</label>
	                        <input type="text" id="tel" name="tel" class="form-control" th:value="${dining.tel}" placeholder="02-000-0000">
	                    </div>
	                </div>
	
	                <div class="form-section">
	                    <h4 class="section-title">운영 정보</h4>
	                    <div class="form-group">
	                        <label for="business_hours">이용 시간</label>
	                        <textarea id="business_hours" name="business_hours" class="form-control" rows="2" 
	                                  th:text="${dining.business_hours}" placeholder="예: 평일 11:30 - 22:00 (Break Time 15:00 - 17:30)"></textarea>
	                    </div>
	                </div>
	
	                <div class="form-section">
	                    <h4 class="section-title">콘텐츠 관리</h4>
	                    <div class="form-group">
	                        <label for="description">상세 소개 (Intro)</label>
	                        <textarea id="description" name="description" class="form-control" rows="4" 
	                                  th:text="${dining.description}"></textarea>
	                        <small class="text-muted">페이지 상단에 노출되는 소개글입니다.</small>
	                    </div>
	                    
	                    <div class="form-group mt-4">
	                        <label for="extra_info">추가 정보 (Extra Info)</label>
	                        <textarea id="extra_info" name="extra_info" class="form-control" rows="8" 
	                                  th:text="${dining.extra_info}"></textarea>
	                        <small class="text-muted">하단 안내사항에 노출되며, HTML 태그를 사용할 수 있습니다.</small>
	                    </div>
	                </div>
	
	                <div class="text-center mt-5">
	                    <button type="submit" class="btn btn-save mr-2">설정 저장하기</button>
	                    <a th:href="@{/dining/detail/{id}(id=${dining.dining_id})}" class="btn btn-outline-secondary btn-cancel">취소</a>
	                </div>
	            </form>
	            
	        </div>
        </div>
    </div>

    <script th:fragment="script">
        $(document).ready(function(){
            $('form').on('submit', function() {
                return confirm('수정된 내용을 저장하시겠습니까?');
            });
        });
    </script>
</body>
</html>
