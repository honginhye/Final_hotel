<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
    <title>1:1 문의하기 - CIEL HOTEL</title>
    <th:block th:fragment="link"></th:block>
    <th:block th:fragment="style">
        <style>
            .write-container { padding: 150px 0 100px; max-width: 800px; margin: 0 auto; }
            .write-title { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 50px; letter-spacing: 1px; }
            
            .write-form-wrap { border-top: 2px solid #1a1a1a; padding-top: 30px; }
            .form-group { margin-bottom: 25px; }
            .form-label { font-weight: 600; font-size: 0.95rem; margin-bottom: 10px; display: block; color: #333; }
            
            .form-control { 
                border-radius: 0; border: 1px solid #ddd; padding: 12px 15px; font-size: 0.95rem;
                transition: border-color 0.3s;
            }
            .form-control:focus { border-color: #d4af37; box-shadow: none; outline: none; }
            .form-control[readonly] { background-color: #f9f9f9; cursor: not-allowed; }
            
            textarea.form-control { min-height: 300px; resize: none; }
            
            /* 비밀글 체크박스 스타일 */
            .secret-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
            .secret-wrap input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #1a1a1a; }
            
            .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 50px; }
            .btn-custom { padding: 15px 50px; font-size: 1rem; border-radius: 0; transition: 0.3s; text-decoration: none; display: inline-block; text-align: center; }
            .btn-cancel { background: #f4f4f4; color: #666; border: 1px solid #eee; }
            .btn-cancel:hover { background: #e8e8e8; }
            .btn-submit { background: #1a1a1a; color: #fff; border: 1px solid #1a1a1a; }
            .btn-submit:hover { background: #d4af37; border-color: #d4af37; }
            
            .hotel-badge { 
                display: inline-block; padding: 5px 15px; background: #f9f6ed; color: #b08d2b; 
                font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; border: 1px solid #eaddbc;
            }
            .info-text { font-size: 0.8rem; color: #888; margin-top: 5px; }
        </style>
    </th:block>
</head>
<body>

<th:block th:fragment="content">
    <div class="container write-container">
        <h2 class="write-title">1:1 문의하기</h2>

        <div class="write-form-wrap">
            <form id="qnaWriteFrm" name="qnaWriteFrm" th:action="@{/cs/qnaWriteEnd}" method="post">
                <input type="hidden" name="fk_hotel_id" th:value="${hotelId}">
                
                <div class="hotel-badge">
                    <i class="bi bi-building"></i> 
                    <span th:text="${hotelId == '1' ? '호텔 시엘 (CIEL)' : '르 시엘 (LE CIEL)'}">선택된 호텔</span>
                </div>

                <div class="form-group">
                    <label class="form-label">문의 제목</label>
                    <input type="text" name="title" id="title" class="form-control w-100" placeholder="제목을 입력해주세요." required>
                </div>

                <div class="form-group">
				    <label class="form-label">작성자</label>
				    
				    <div sec:authorize="isAuthenticated()">
				        <input type="text" name="writer_name" id="writer_name" 
				               class="form-control w-100" 
				               th:value="${#authentication.principal.username}" readonly>
				        <p class="info-text"><i class="bi bi-info-circle"></i> 회원 계정 정보로 작성됩니다.</p>
				    </div>
				
				    <div sec:authorize="isAnonymous()" th:if="${session.Session_GuestDTO != null}">
				        <input type="text" name="writer_name" id="writer_name" 
				               class="form-control w-100" 
				               th:value="${session.Session_GuestDTO.guestName}" readonly>
				        <p class="info-text"><i class="bi bi-info-circle"></i> 비회원 예약 정보(성함)로 작성됩니다.</p>
				    </div>
				
				    <div sec:authorize="isAnonymous()" th:if="${session.Session_GuestDTO == null}">
				        <input type="text" name="writer_name" id="writer_name" 
				               class="form-control w-100" 
				               placeholder="성함을 입력해주세요." required>
				    </div>
				</div>

                <div class="form-group">
                    <label class="form-label">문의 내용</label>
                    <textarea name="content" id="content" class="form-control w-100" placeholder="내용을 상세히 입력해 주세요. (문의 유형, 예약번호 등)" required></textarea>
                </div>

                <div class="form-group">
				    <label>
				        <input type="checkbox" name="is_secret" value="1"> 비밀글로 문의하기
				    </label>
				</div>

                <div class="btn-group">
                    <a th:href="@{/cs/list(hotelId=${hotelId})}" class="btn-custom btn-cancel">취소</a>
                    <button type="button" class="btn-custom btn-submit" onclick="goWrite()">등록하기</button>
                </div>
            </form>
        </div>
    </div>
</th:block>

<th:block th:fragment="script">
    <script th:inline="javascript">
        function goWrite() {
            const title = $("#title").val().trim();
            const writer = $("#writer_name").val().trim();
            const content = $("#content").val().trim();

            if(title == "") {
                alert("제목을 입력하세요.");
                $("#title").focus();
                return;
            }
            if(writer == "") {
                alert("작성자를 입력하세요.");
                $("#writer_name").focus();
                return;
            }
            if(content == "") {
                alert("내용을 입력하세요.");
                $("#content").focus();
                return;
            }

            const frm = document.qnaWriteFrm;
            frm.submit();
        }
    </script>
</th:block>
</body>
</html>
