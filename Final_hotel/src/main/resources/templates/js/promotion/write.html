<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
    <title>프로모션 등록 - CIEL HOTEL</title>
    
    <th:block th:fragment="link">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </th:block>

    <th:block th:fragment="style">
        <style>
            .write-container { padding: 150px 0 80px; max-width: 900px; margin: 0 auto; }
            .write-title { text-align: center; margin-bottom: 40px; }
            .form-section { background: #fff; border: 1px solid #eee; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
            
            .section-label { font-size: 1.1rem; font-weight: 700; color: #d4af37; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f4f4f4; display: block; }
            .form-group label { font-weight: 600; color: #333; margin-bottom: 8px; display: block; font-size: 0.9rem; }
            
            /* [수정] 입력창 및 셀렉트 박스 크기 확대 */
            .form-control { 
                border-radius: 0; 
                border: 1px solid #ddd; 
                padding: 12px 15px; /* 패딩을 늘려 내부 텍스트가 잘리지 않게 함 */
                font-size: 0.95rem; 
                height: auto; /* 높이를 자동 설정하여 내용물에 맞춤 */
                line-height: 1.5;
            }
            .form-control:focus { border-color: #d4af37; box-shadow: none; }
            .form-control:disabled { background-color: #f4f4f4; cursor: not-allowed; opacity: 0.6; }
            
            /* [추가] 드롭다운 전용 스타일 */
            select.form-control {
                appearance: none; /* 브라우저 기본 화살표 스타일 제거 (필요시) */
                background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
                background-repeat: no-repeat;
                background-position: right 0.75rem center;
                background-size: 16px 12px;
                padding-right: 40px; /* 화살표 공간 확보 */
            }
            
            .hotel-badge { display: inline-block; padding: 5px 15px; background: #1a1a1a; color: #fff; font-weight: 600; margin-bottom: 25px; font-size: 0.85rem; }
            
            .img-preview { width: 100%; height: 250px; background: #f9f9f9; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; margin-top: 10px; color: #999; overflow: hidden; }
            .img-preview img { width: 100%; height: 100%; object-fit: cover; }
            
            .btn-area { display: flex; gap: 15px; margin-top: 40px; }
            .btn-custom { flex: 1; padding: 15px; font-weight: 600; border-radius: 0; transition: 0.3s; cursor: pointer; text-align: center; border: 1px solid #1a1a1a; text-decoration: none !important; }
            .btn-submit { background: #1a1a1a; color: #fff; border: none; }
            .btn-submit:hover { background: #d4af37; color: #fff; }
            .btn-cancel { background: #fff; color: #666; }
        </style>
    </th:block>
</head>
<body>

<th:block th:fragment="content">
    <div class="container write-container">
        <div class="write-title">
            <h2 style="font-size: 2.2rem; font-weight: 700; letter-spacing: 1px;">프로모션 생성</h2>
        </div>
        
        <div class="form-section">
            <div class="hotel-badge">
                <i class="bi bi-geo-alt-fill mr-1"></i>
			    <th:block th:each="h : ${hotelList}" th:if="${#strings.equals(hotelId, h.HOTEL_ID)}">
			        <span th:text="${h.HOTEL_NAME}">지점명</span>
			    </th:block>
            </div>

            <form id="promoForm" th:action="@{/promotion/writeEnd}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="fk_hotel_id" th:value="${hotelId}">
                <input type="hidden" name="banner_type" value="CARD">

                <span class="section-label">1. 기본 프로모션 정보</span>
                <div class="form-group mb-4">
                    <label>프로모션 제목</label>
                    <input type="text" name="title" class="form-control" placeholder="예: [얼리버드] 여름 휴가 패키지" required>
                </div>

                <div class="row">
                <!-- 나중에 패키지 프로모션 만들때 사용할 예정 -->
                
                <input type="hidden" name="price" id="price" class="form-control" 
			                       placeholder="숫자만 입력" oninput="inputNumberFormat(this)">
                
			        <div class="col-md-6">
			            <div class="form-group mb-4">
			                <label>할인율</label>
			                <input type="number" name="discount_rate" id="discount_rate" class="form-control" 
			                       min="0" max="100" placeholder="0 ~ 100" oninput="toggleDiscountFields('rate')">
			            </div>
			        </div>
			        <div class="col-md-6">
			            <div class="form-group mb-4">
			                <label>할인금액</label>
			                <input type="text" name="discount_amount" id="discount_amount" class="form-control" 
			                       placeholder="정액 할인 시 입력" oninput="inputNumberFormat(this); toggleDiscountFields('amount');">
			            </div>
			        </div>
			    </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-4">
                            <label>시작일</label>
                            <input type="date" name="start_date" id="start_date" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-4">
                            <label>종료일</label>
                            <input type="date" name="end_date" id="end_date" class="form-control" required>
                        </div>
                    </div>
                </div>

                <span class="section-label mt-4">2. 배너 및 노출 상세 정보</span>
                <div class="form-group mb-4">
                    <label>서브 타이틀</label>
                    <input type="text" name="subtitle" class="form-control" placeholder="제목 아래에 표시될 간단한 문구">
                </div>

                <div class="form-group mb-4">
                    <label>주요 혜택</label>
                    <textarea name="benefits" class="form-control" rows="3" placeholder="예: 조식 2인 포함, 레이트 체크아웃 등"></textarea>
                </div>
                
                <span class="section-label mt-4">3. 프로모션 적용 대상 설정</span>
				<div class="row">
				    <div class="col-md-4">
				        <div class="form-group mb-4">
				            <label>적용 객실 등급</label>
				            <select name="target_room_type" class="form-control">
				                <option value="">객실등급 전체</option>
				                <option value="DELUXE">DELUXE</option>
				                <option value="PREMIER">PREMIER</option>
				                <option value="SUITE">SUITE</option>
				                <option value="STANDARD">STANDARD</option>
				            </select>
				        </div>
				    </div>
				    
				    <div class="col-md-4">
				        <div class="form-group mb-4">
				            <label>적용 침대 타입</label>
				            <select name="target_bed_type" class="form-control">
				                <option value="">침대타입 전체</option>
				                <option value="DOUBLE">DOUBLE</option>
				                <option value="TWIN">TWIN</option>
				                <option value="KING">KING</option>
				            </select>
				        </div>
				    </div>
				
				    <div class="col-md-4">
				        <div class="form-group mb-4">
				            <label>적용 전망</label>
				            <select name="target_view_type" class="form-control">
				                <option value="">전망 전체</option>
				                <option value="CITY">CITY</option>
				                <option value="RIVER">RIVER</option>
				            </select>
				        </div>
				    </div>
				</div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-4">
                            <label>정렬 순서</label>
                            <input type="number" name="sort_order" class="form-control" value="1">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-4">
                            <label>활성화 여부</label>
                            <select name="is_active" id="is_active" class="form-control">
                                <option value="1">활성화 (Y)</option>
                                <option value="0">비활성화 (N)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label>이미지 업로드 (IMAGE_URL)</label>
                    <input type="file" name="attach" id="attach" class="form-control-file" accept="image/*" onchange="previewImage(this)" required>
                    <div class="img-preview" id="previewBox">이미지를 선택해주세요.</div>
                </div>

                <div class="btn-area">
                    <a href="javascript:history.back();" class="btn-custom btn-cancel">취소</a>
                    <button type="button" class="btn-custom btn-submit" onclick="goSubmit()">등록하기</button>
                </div>
            </form>
        </div>
    </div>
</th:block>

<th:block th:fragment="script">
    <script th:inline="javascript">
    	
	    function comma(str) {
	        str = String(str);
	        return str.replace(/(\d)(?=(?:\d{3})+(?!\d))/g, '$1,');
	    }
	
	    function uncomma(str) {
	        str = String(str);
	        return str.replace(/[^\d]+/g, '');
	    }
	
	    function inputNumberFormat(obj) {
	        obj.value = comma(uncomma(obj.value));
	    }
    
        function toggleDiscountFields(type) {
            const rateInput = document.getElementById('discount_rate');
            const amountInput = document.getElementById('discount_amount');

            if (type === 'rate') {
                if (Number(rateInput.value) > 100) {
                    alert("할인율은 100%를 초과할 수 없습니다.");
                    rateInput.value = 100;
                }
                if (rateInput.value.trim() !== "") {
                    amountInput.value = "";
                    amountInput.disabled = true;
                } else {
                    amountInput.disabled = false;
                }
            } else if (type === 'amount') {
                if (uncomma(amountInput.value).trim() !== "") {
                    rateInput.value = "";
                    rateInput.disabled = true;
                } else {
                    rateInput.disabled = false;
                }
            }
        }

        function previewImage(input) {
            const preview = document.getElementById('previewBox');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function goSubmit() {
            const form = document.getElementById('promoForm');
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;

            if(!form.title.value.trim()){ alert("제목을 입력하세요."); return; }
            if(!startDate || !endDate){ alert("기간을 입력하세요."); return; }
            if (startDate > endDate) { alert("종료일이 시작일보다 빠를 수 없습니다."); return; }
            if(!form.attach.value){ alert("이미지를 업로드해주세요."); return; }

            // 전송 직전 콤마 제거
            const priceInput = document.getElementById('price');
            const amountInput = document.getElementById('discount_amount');
            priceInput.value = uncomma(priceInput.value);
            amountInput.value = uncomma(amountInput.value);

            if(confirm("프로모션을 등록하시겠습니까?")) {
                form.submit();
            }
        }
    </script>
</th:block>

</body>
</html>
