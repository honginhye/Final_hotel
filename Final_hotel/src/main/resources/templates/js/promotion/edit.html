<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
    <title th:text="${promo.title} + ' - 수정 | CIEL HOTEL'">프로모션 수정 - CIEL HOTEL</title>
    
    <th:block th:fragment="link">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </th:block>

    <th:block th:fragment="style">
        <style>
            .edit-container { padding: 150px 0 80px; max-width: 900px; margin: 0 auto; }
            .write-title { text-align: center; margin-bottom: 40px; }
            .form-section { background: #fff; border: 1px solid #eee; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
            
            .section-label { font-size: 1.1rem; font-weight: 700; color: #d4af37; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f4f4f4; display: block; }
            .form-group label { font-weight: 600; color: #333; margin-bottom: 8px; display: block; font-size: 0.9rem; }
            
            .form-control { border-radius: 0; border: 1px solid #ddd; padding: 12px 15px; font-size: 0.95rem; height: auto; line-height: 1.5; }
            .form-control:focus { border-color: #d4af37; box-shadow: none; }
            .form-control:disabled { background-color: #f4f4f4; cursor: not-allowed; opacity: 0.6; }
            
            select.form-control {
                appearance: none;
                background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
                background-repeat: no-repeat;
                background-position: right 0.75rem center;
                background-size: 16px 12px;
                padding-right: 40px;
            }
            
            .hotel-badge { display: inline-block; padding: 5px 15px; background: #1a1a1a; color: #fff; font-weight: 600; margin-bottom: 25px; font-size: 0.85rem; }
            .img-preview { width: 100%; height: 250px; background: #f9f9f9; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; margin-top: 10px; color: #999; overflow: hidden; }
            .img-preview img { width: 100%; height: 100%; object-fit: cover; }
            
            .btn-area { display: flex; gap: 15px; margin-top: 40px; }
            .btn-custom { flex: 1; padding: 15px; font-weight: 600; border-radius: 0; transition: 0.3s; cursor: pointer; text-align: center; border: 1px solid #1a1a1a; text-decoration: none !important; }
            .btn-submit { background: #1a1a1a; color: #fff; border: none; }
            .btn-submit:hover { background: #d4af37; color: #fff; }
            .btn-cancel { background: #fff; color: #666; }
        </style>
    </th:block>
</head>
<body>

<th:block th:fragment="content">
    <div class="container edit-container">
        <div class="write-title">
            <h2 style="font-size: 2.2rem; font-weight: 700; letter-spacing: 1px;">프로모션 수정</h2>
        </div>
        
        <div class="form-section">
            <div class="hotel-badge">
                <i class="bi bi-geo-alt-fill mr-1"></i>
                <span th:text="${promo.fk_hotel_id == 1 ? 'CIEL HOTEL' : 'LE CIEL'}">지점명</span>
            </div>

            <form id="editForm" th:action="@{/promotion/update}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="promotion_id" th:value="${promo.promotion_id}">
                <input type="hidden" name="fk_hotel_id" th:value="${promo.fk_hotel_id}">
                <input type="hidden" name="price" id="price" th:value="${promo.price}">

                <span class="section-label">1. 기본 프로모션 정보</span>
                <div class="form-group mb-4">
                    <label>프로모션 제목</label>
                    <input type="text" name="title" class="form-control" th:value="${promo.title}" required>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-4">
                            <label>할인율 (%)</label>
                            <input type="number" name="discount_rate" id="discount_rate" class="form-control" 
                                   th:value="${promo.discount_rate}" min="0" max="100" placeholder="0 ~ 100" 
                                   oninput="toggleDiscountFields('rate')">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-4">
                            <label>할인금액 (KRW)</label>
                            <input type="text" name="discount_amount" id="discount_amount" class="form-control" 
                                   th:value="${promo.discount_amount != null ? #numbers.formatInteger(promo.discount_amount, 0, 'COMMA') : ''}"
                                   placeholder="정액 할인 시 입력"
                                   oninput="inputNumberFormat(this); toggleDiscountFields('amount');">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-4">
                            <label>시작일</label>
                            <input type="date" name="start_date" id="start_date" class="form-control" th:value="${promo.start_date}" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-4">
                            <label>종료일</label>
                            <input type="date" name="end_date" id="end_date" class="form-control" th:value="${promo.end_date}" required>
                        </div>
                    </div>
                </div>

                <span class="section-label mt-4">2. 배너 및 노출 상세 정보</span>
                <div class="form-group mb-4">
                    <label>서브 타이틀</label>
                    <input type="text" name="subtitle" class="form-control" th:value="${promo.subtitle}">
                </div>

                <div class="form-group mb-4">
                    <label>주요 혜택</label>
                    <textarea name="benefits" class="form-control" rows="3" th:text="${promo.benefits}"></textarea>
                </div>
                
                <span class="section-label mt-4">3. 프로모션 적용 대상 설정</span>
				<div class="row">
				    <div class="col-md-4"> 
				        <div class="form-group mb-4">
				            <label>적용 객실 등급</label>
				            <select name="target_room_type" class="form-control">
				                <option value="" th:selected="${promo.target_room_type == null || promo.target_room_type == ''}">객실등급 전체</option>
				                <option value="DELUXE" th:selected="${promo.target_room_type == 'DELUXE'}">DELUXE</option>
				                <option value="PREMIER" th:selected="${promo.target_room_type == 'PREMIER'}">PREMIER</option>
				                <option value="SUITE" th:selected="${promo.target_room_type == 'SUITE'}">SUITE</option>
				                <option value="STANDARD" th:selected="${promo.target_room_type == 'STANDARD'}">STANDARD</option>
				            </select>
				        </div>
				    </div>
				    
				    <div class="col-md-4">
				        <div class="form-group mb-4">
				            <label>적용 침대 타입</label>
				            <select name="target_bed_type" class="form-control">
				                <option value="" th:selected="${promo.target_bed_type == null || promo.target_bed_type == ''}">침대타입 전체</option>
				                <option value="DOUBLE" th:selected="${promo.target_bed_type == 'DOUBLE'}">DOUBLE</option>
				                <option value="TWIN" th:selected="${promo.target_bed_type == 'TWIN'}">TWIN</option>
				                <option value="KING" th:selected="${promo.target_bed_type == 'KING'}">KING</option>
				            </select>
				        </div>
				    </div>
				
				    <div class="col-md-4">
				        <div class="form-group mb-4">
				            <label>적용 전망</label>
				            <select name="target_view_type" class="form-control">
				                <option value="" th:selected="${promo.target_view_type == null || promo.target_view_type == ''}">전망 전체</option>
				                <option value="CITY" th:selected="${promo.target_view_type == 'CITY'}">CITY</option>
				                <option value="RIVER" th:selected="${promo.target_view_type == 'RIVER'}">RIVER</option>
				            </select>
				        </div>
				    </div>
				</div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group mb-4">
                            <label>정렬 순서</label>
                            <input type="number" name="sort_order" class="form-control" th:value="${promo.sort_order}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group mb-4">
                            <label>활성화 여부</label>
                            <select name="is_active" id="is_active" class="form-control">
                                <option value="1" th:selected="${promo.is_active == 1}">활성화 (Y)</option>
                                <option value="0" th:selected="${promo.is_active == 0}">비활성화 (N)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label>이미지 변경 (IMAGE_URL)</label>
                    <input type="file" name="attach" id="attach" class="form-control-file" accept="image/*" onchange="previewImage(this)">
                    <div class="img-preview" id="previewBox">
                        <img th:if="${promo.image_url != null}" th:src="@{'/images/js/' + ${promo.image_url}}" alt="기존 이미지">
                        <span th:unless="${promo.image_url != null}">등록된 이미지가 없습니다.</span>
                    </div>
                    <small class="text-muted">* 이미지를 새로 변경할 경우에만 파일을 선택해 주세요.</small>
                </div>

                <div class="btn-area">
                    <a href="javascript:history.back();" class="btn-custom btn-cancel">취소</a>
                    <button type="button" class="btn-custom btn-submit" onclick="goUpdate()">수정완료</button>
                </div>
            </form>
        </div>
    </div>
</th:block>

<th:block th:fragment="script">
    <script th:inline="javascript">
        // 1. 숫자 포맷 유틸리티
        function comma(str) {
            str = String(str);
            return str.replace(/(\d)(?=(?:\d{3})+(?!\d))/g, '$1,');
        }
        function uncomma(str) {
            str = String(str);
            return str.replace(/[^\d]+/g, '');
        }
        function inputNumberFormat(obj) {
            obj.value = comma(uncomma(obj.value));
        }

        // 2. 할인 입력 필드 제어 (상호 배타적 입력)
        function toggleDiscountFields(type) {
            const rateInput = document.getElementById('discount_rate');
            const amountInput = document.getElementById('discount_amount');

            if (type === 'rate') {
                if (Number(rateInput.value) > 100) {
                    alert("할인율은 100%를 초과할 수 없습니다.");
                    rateInput.value = 100;
                }
                if (rateInput.value.trim() !== "") {
                    amountInput.value = "";
                    amountInput.disabled = true;
                } else {
                    amountInput.disabled = false;
                }
            } else if (type === 'amount') {
                if (uncomma(amountInput.value).trim() !== "") {
                    rateInput.value = "";
                    rateInput.disabled = true;
                } else {
                    rateInput.disabled = false;
                }
            }
        }

        // 3. 이미지 미리보기
        function previewImage(input) {
            const preview = document.getElementById('previewBox');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}">`;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 4. 수정 제출 로직
        function goUpdate() {
            const form = document.getElementById('editForm');
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;

            if(!form.title.value.trim()){ alert("제목을 입력하세요."); return; }
            if(!startDate || !endDate){ alert("기간을 입력하세요."); return; }
            if (startDate > endDate) { alert("종료일이 시작일보다 빠를 수 없습니다."); return; }

            // 전송 전 disabled 필드를 해제해야 값이 넘어감
            const rateInput = document.getElementById('discount_rate');
            const amountInput = document.getElementById('discount_amount');
            rateInput.disabled = false;
            amountInput.disabled = false;

            // 콤마 제거 및 빈 값 0 처리 (DB 에러 방지)
            const priceInput = document.getElementById('price');
            
            if(priceInput) priceInput.value = uncomma(priceInput.value) || 0;
            if(rateInput) rateInput.value = rateInput.value || 0;
            if(amountInput) amountInput.value = uncomma(amountInput.value) || 0;

            if(confirm("프로모션 수정사항을 저장하시겠습니까?")) {
                form.submit();
            }
        }

        // 초기 로드 시 기존 값에 따라 입력 필드 상태 설정
        window.onload = function() {
            const rate = document.getElementById('discount_rate').value;
            const amount = document.getElementById('discount_amount').value;
            
            if (rate && Number(rate) > 0) {
                toggleDiscountFields('rate');
            } else if (amount && amount !== "" && amount !== "0") {
                toggleDiscountFields('amount');
            }
        };
    </script>
</th:block>

</body>
</html>
