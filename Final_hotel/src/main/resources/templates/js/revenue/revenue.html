<!DOCTYPE html>
<html lang="ko" 
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
    <title>수익 관리 | CIEL HOTEL Admin</title>
    
    <th:block th:fragment="link">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </th:block>

    <th:block th:fragment="style">
        <style>
            .admin-content-wrap { padding: 150px 80px; background: #f4f7f6; min-height: 100vh; }
            .page-header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
            .stat-cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
            .stat-card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; }
            .stat-icon { width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
            .icon-revenue { background: #e3f2fd; color: #1976d2; }
            .icon-booking { background: #f1f8e9; color: #689f38; }
            .icon-cancel { background: #fff3e0; color: #f57c00; }
            .icon-occupancy { background: #f3e5f5; color: #7b1fa2; }
            .stat-info h4 { font-size: 0.9rem; color: #888; margin: 0 0 5px 0; }
            .stat-info .value { font-size: 1.4rem; font-weight: 700; color: #333; }
            .chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
            .chart-box { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
            .revenue-table-box { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
            .table { width: 100%; border-collapse: collapse; margin-top: 15px; }
            .table th { background: #f8f9fa; color: #666; font-weight: 600; padding: 15px; border-bottom: 2px solid #eee; text-align: left; }
            .table td { padding: 15px; border-bottom: 1px solid #eee; color: #444; }
            .badge-success { background: #e8f5e9; color: #2e7d32; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }
            .badge-danger { background: #ffebee; color: #c62828; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }
        </style>
    </th:block>
</head>
<body>

<th:block th:fragment="content">
    <div class="admin-content-wrap">
        <div class="page-header">
            <h2><i class="bi bi-graph-up-arrow mr-2"></i>수익 및 분석 관리</h2>
            <div class="date-filter">
                <input type="month" id="searchMonth" class="form-control" th:value="${selectedMonth}" onchange="loadRevenueData()">
            </div>
        </div>

        <div class="stat-cards-row">
            <div class="stat-card">
                <div class="stat-icon icon-revenue"><i class="bi bi-currency-dollar"></i></div>
                <div class="stat-info">
                    <h4>총 매출액</h4>
                    <div class="value" id="totalRevenue">₩ 0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-booking"><i class="bi bi-calendar-check"></i></div>
                <div class="stat-info">
                    <h4>예약 건수</h4>
                    <div class="value" id="totalBookings">0건</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-occupancy"><i class="bi bi-house-door"></i></div>
                <div class="stat-info">
                    <h4>평균 객실 점유율</h4>
                    <div class="value">84.2%</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-cancel"><i class="bi bi-x-circle"></i></div>
                <div class="stat-info">
                    <h4>취소 건수</h4>
                    <div class="value" id="cancelCount">0건</div>
                </div>
            </div>
        </div>

        <div class="chart-row">
            <div class="chart-box">
                <div class="chart-title">월간 수익 추이</div>
                <canvas id="revenueLineChart" height="100"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">객실 등급별 매출 비중</div>
                <canvas id="roomDoughnutChart"></canvas>
            </div>
        </div>

        <div class="revenue-table-box">
            <div class="chart-title" id="tableTitle">최근 결제 내역</div>
            <table class="table">
                <thead>
                    <tr>
                        <th>결제일자</th>
                        <th>결제번호</th>
                        <th>고객명</th>
                        <th>결제금액</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody id="revenueTableBody"></tbody>
            </table>
        </div>
    </div>
</th:block>

<th:block th:fragment="script">
    <script th:inline="javascript">
        let lineChart, doughnutChart;

        document.addEventListener('DOMContentLoaded', function() {
            loadRevenueData(); // 첫 로딩 시 실행
        });

        async function loadRevenueData() {
            const targetMonth = document.getElementById('searchMonth').value;
            // context path (/final_hotel) 포함 확인
            const url = `/final_hotel/admin/revenue/data?month=${targetMonth}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                // 1. 통계 카드 업데이트
                const summary = data.summary || {TOTAL_REVENUE:0, TOTAL_COUNT:0, CANCEL_COUNT:0};
                document.getElementById('totalRevenue').innerText = '₩ ' + (summary.TOTAL_REVENUE || 0).toLocaleString();
                document.getElementById('totalBookings').innerText = (summary.TOTAL_COUNT || 0) + '건';
                document.getElementById('cancelCount').innerText = (summary.CANCEL_COUNT || 0) + '건';

                // 2. 차트 및 테이블 업데이트
                updateLineChart(data.dailyTrends);
                updateDoughnutChart(data.roomTypePortion);
                updateTable(data.revenueList, targetMonth);

            } catch (error) {
                console.error("데이터 로드 실패:", error);
            }
        }

        function updateLineChart(trends) {
            const ctx = document.getElementById('revenueLineChart').getContext('2d');
            const labels = trends ? trends.map(item => item.PAID_DAY + '일') : [];
            const values = trends ? trends.map(item => item.DAILY_REVENUE) : [];
            if (lineChart) lineChart.destroy();
            lineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: '일별 매출', data: values, borderColor: '#1976d2', fill: true, tension: 0.4 }]
                }
            });
        }

        function updateDoughnutChart(portions) {
            const ctx = document.getElementById('roomDoughnutChart').getContext('2d');
            const labels = (portions && portions.length > 0) ? portions.map(item => item.ROOM_TYPE) : ['데이터 없음'];
            const values = (portions && portions.length > 0) ? portions.map(item => item.TYPE_REVENUE) : [1];
            if (doughnutChart) doughnutChart.destroy();
            doughnutChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: values, backgroundColor: ['#1976d2', '#689f38', '#d4af37', '#e0e0e0'] }] }
            });
        }

        function updateTable(list, month) {
            const tbody = document.getElementById('revenueTableBody');
            document.getElementById('tableTitle').innerText = month + ' 결제 상세 내역';
            tbody.innerHTML = list.length === 0 ? '<tr><td colspan="5" class="text-center">데이터 없음</td></tr>' : '';
            list.forEach(item => {
                const badge = item.PAYMENT_STATUS === 'SUCCESS' ? 'badge-success' : 'badge-danger';
                const status = item.PAYMENT_STATUS === 'SUCCESS' ? '결제완료' : '취소됨';
                const row = `<tr>
                    <td>${item.PAID_AT}</td>
                    <td>${item.PAYMENT_ID}</td>
                    <td>${item.MEMBER_NAME}</td>
                    <td>₩ ${item.PAYMENT_AMOUNT.toLocaleString()}</td>
                    <td><span class="${badge}">${status}</span></td>
                </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }
    </script>
</th:block>
</body>
</html>
