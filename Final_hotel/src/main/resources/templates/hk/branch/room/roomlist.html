<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<title>객실 관리 (지점관리자)</title>

<style>
body {
	font-family: Arial;
}

table {
	border-collapse: collapse;
	width: 100%;
}

th, td {
	border: 1px solid #ddd;
	padding: 10px;
	text-align: center;
}

th {
	background: #f2f2f2;
}

.title {
	margin-bottom: 20px;
}

.btn-area {
	margin-bottom: 15px;
}
</style>

</head>

<body>

	<h2 class="title">객실 관리(지점관리자)</h2>

	<!-- 호텔 이름 표시 -->
	<h3 th:text="'호텔 : ' + ${hotelName}"></h3>

	<!-- 객실 등록 버튼 -->
	<div class="btn-area">
		<a th:href="@{/admin/room/register}">
			<button>객실 등록 신청</button>
		</a>
	</div>


	<h3>승인된 객실(운영중)</h3>

	<table>

		<thead>
			<tr>
				<th>호텔</th>
				<th>사진명</th>
				<th>객실명</th>
				<th>등급</th>
				<th>침대</th>
				<th>뷰</th>
				<th>최대인원</th>
				<th>재고</th>
				<th>가격</th>
				<th>관리</th>
			</tr>
		</thead>

		<tbody>

			<tr th:each="room : ${approvedList}">

				<td th:text="${room.hotel_name}"></td>

				<!-- 객실 이미지 -->
				<td><img th:src="@{${room.image_url}}"
					style="width: 150px; height: 100px; object-fit: cover; border-radius: 4px;">
				</td>
				<td th:text="${room.room_name}"></td>
				<td th:text="${room.room_grade}"></td>
				<td th:text="${room.bed_type}"></td>
				<td th:text="${room.view_type}"></td>
				<td th:text="${room.max_capacity}"></td>
				<td th:text="${room.total_count}"></td>
				<td th:text="${room.base_price}"></td>

				<td>
					<button class="btn btn-sm btn-primary" data-bs-toggle="modal"
						data-bs-target="#editModal"
						th:attr="data-id=${room.room_type_id},
						         data-name=${room.room_name},
						         data-grade=${room.room_grade},
						         data-bed=${room.bed_type},
						         data-view=${room.view_type},
						         data-price=${room.base_price},
						         data-count=${room.total_count},
						         data-image=${room.image_url}">
						수정</button>
						
					<form th:action="@{/admin/room/deactivate}"
			          method="post"
			          style="display:inline"
			          onsubmit="return confirm('객실을 비활성화 하시겠습니까?');">
			
			        <input type="hidden"
			               name="roomTypeId"
			               th:value="${room.room_type_id}">
			
			        <button type="submit"
			                class="btn btn-sm btn-danger">
			            비활성화
			        </button>
				    </form>
				</td>

			</tr>

		</tbody>

	</table>


	<h3 style="margin-top: 40px;">승인 대기 객실</h3>

	<table>

		<thead>
			<tr>
				<th>호텔</th>
				<th>사진</th>
				<th>객실명</th>
				<th>등급</th>
				<th>침대</th>
				<th>뷰</th>
				<th>최대인원</th>
				<th>재고</th>
				<th>가격</th>
				<th>상태</th>

			</tr>
		</thead>

		<tbody>

			<tr th:each="room : ${pendingList}">

				<td th:text="${room.hotel_name}"></td>

				<td><img th:src="@{${room.image_url}}"
					style="width: 150px; height: 100px; object-fit: cover; border-radius: 4px;">
				</td>

				<td th:text="${room.room_name}"></td>
				<td th:text="${room.room_grade}"></td>
				<td th:text="${room.bed_type}"></td>
				<td th:text="${room.view_type}"></td>
				<td th:text="${room.max_capacity}"></td>
				<td th:text="${room.total_count}"></td>
				<td th:text="${room.base_price}"></td>

				<td style="color: orange;">승인 대기</td>

			</tr>

		</tbody>
	</table>



	<h3 style="margin-top: 40px;">반려된 객실</h3>

	<table>

		<thead>
			<tr>
				<th>호텔</th>
				<th>사진</th>
				<th>객실명</th>
				<th>등급</th>
				<th>침대</th>
				<th>뷰</th>
				<th>최대인원</th>
				<th>재고</th>
				<th>가격</th>
				<th>상태</th>
				<th>관리</th>
			</tr>
		</thead>

		<tbody>

			<tr th:each="room : ${rejectedList}">

				<td th:text="${room.hotel_name}"></td>

				<!-- 객실 이미지 -->
				<td><img th:src="@{${room.image_url}}"
					style="width: 150px; height: 100px; object-fit: cover; border-radius: 4px;">
				</td>

				<td th:text="${room.room_name}"></td>
				<td th:text="${room.room_grade}"></td>
				<td th:text="${room.bed_type}"></td>
				<td th:text="${room.view_type}"></td>
				<td th:text="${room.max_capacity}"></td>
				<td th:text="${room.total_count}"></td>
				<td th:text="${room.base_price}"></td>

				<td style="color: red;">반려</td>

				<td>
					<!-- 수정 모달 버튼 -->
					<button class="btn btn-sm btn-primary" data-bs-toggle="modal"
						data-bs-target="#editModal"
						th:attr="data-id=${room.room_type_id},
						         data-name=${room.room_name},
						         data-grade=${room.room_grade},
						         data-bed=${room.bed_type},
						         data-view=${room.view_type},
						         data-price=${room.base_price},
						         data-count=${room.total_count},
						         data-image=${room.image_url}">
						수정</button>
			
					<form th:action="@{/admin/room/resubmit}" method="post"
						style="display: inline"
						onsubmit="return confirm('정말 재상신 하시겠습니까?');">

						<input type="hidden" name="roomTypeId"
							th:value="${room.room_type_id}">

						<button type="submit">재상신</button>

					</form>

				</td>

			</tr>



		</tbody>
	</table>


	<!-- 객실 승인이력 -->
	<h3 style="margin-top: 40px;">객실 승인 이력</h3>

	<table>

		<thead>
			<tr>
				<th>객실ID</th>
				<th>객실명</th>
				<th>상태</th>
				<th>반려사유</th>
				<th>처리자</th>
				<th>처리일</th>
			</tr>
		</thead>

		<tbody>

			<tr th:each="h : ${historyList}">

				<td th:text="${h['ROOM_TYPE_ID']}"></td>

				<td th:text="${h['ROOM_NAME']}"></td>

				<td><span th:if="${h['STATUS']=='APPROVED'}"
					style="color: green;">승인</span> <span
					th:if="${h['STATUS']=='REJECTED'}" style="color: red;">반려</span></td>

				<td th:text="${h['REASON']}"></td>

				<td th:text="${h['DECIDED_BY']}"></td>

				<td th:text="${h['DECIDED_AT']}"></td>

			</tr>

		</tbody>

	</table>


	<!-- 객실 수정 모달 -->
	<div class="modal fade" id="editModal">

		<div class="modal-dialog">

			<div class="modal-content">

				<!-- 수정 form -->
				<form th:action="@{/admin/room/modify}" method="post"
					enctype="multipart/form-data">

					<div class="modal-header">
						<h5 class="modal-title">객실 정보 수정</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>

					<div class="modal-body">

						<!-- 객실 ID (hidden) -->
						<input type="hidden" name="roomTypeId" id="modalRoomId">

						<!-- 현재 이미지 -->
						<div class="mb-2">

							<label>현재 이미지</label> <br> <img id="modalPreview"
								style="width: 200px; height: 120px; object-fit: cover; border-radius: 5px;">

						</div>

						<!-- 이미지 교체 -->
						<div class="mb-2">

							<label>이미지 변경</label> <input type="file" class="form-control"
								name="roomImage">

						</div>


						<div class="mb-2">
							<label>객실명</label> <input class="form-control" name="room_name"
								id="modalRoomName">
						</div>

						<div class="mb-2">
							<label>등급</label> <input class="form-control" name="room_grade"
								id="modalRoomGrade">
						</div>

						<div class="mb-2">
							<label>침대</label> <input class="form-control" name="bed_type"
								id="modalBed">
						</div>

						<div class="mb-2">
							<label>뷰</label> <input class="form-control" name="view_type"
								id="modalView">
						</div>

						<div class="mb-2">
							<label>가격</label> <input class="form-control" name="base_price"
								id="modalPrice">
						</div>

						<div class="mb-2">
							<label>재고</label> <input class="form-control" name="total_count"
								id="modalCount">
						</div>

					</div>

					<div class="modal-footer">
						<button type="submit" class="btn btn-success">저장</button>
						<button type="button" class="btn btn-secondary"
							data-bs-dismiss="modal">닫기</button>
					</div>

				</form>

			</div>

		</div>

	</div>
	
	<h3 style="margin-top: 40px;">비활성 객실</h3>

	<table>
	
	<thead>
	<tr>
	<th>호텔</th>
	<th>사진</th>
	<th>객실명</th>
	<th>등급</th>
	<th>침대</th>
	<th>뷰</th>
	<th>최대인원</th>
	<th>재고</th>
	<th>가격</th>
	<th>상태</th>
	<th>관리</th>
	</tr>
	</thead>
	
	<tbody>
	
	<tr th:each="room : ${inactiveList}">
	
	<td th:text="${room.hotel_name}"></td>
	
	<td>
	<img th:src="@{${room.image_url}}"
	style="width:150px;height:100px;object-fit:cover;border-radius:4px;">
	</td>
	
	<td th:text="${room.room_name}"></td>
	<td th:text="${room.room_grade}"></td>
	<td th:text="${room.bed_type}"></td>
	<td th:text="${room.view_type}"></td>
	<td th:text="${room.max_capacity}"></td>
	<td th:text="${room.total_count}"></td>
	<td th:text="${room.base_price}"></td>
	
	<td style="color:gray;">비활성</td>
	
	<td>

	<form th:action="@{/admin/room/restore}"
	      method="post"
	      style="display:inline"
	      onsubmit="return confirm('객실을 복구하시겠습니까?');">
	
	<input type="hidden"
	       name="roomTypeId"
	       th:value="${room.room_type_id}">
	
	<button type="submit"
	        class="btn btn-success btn-sm">
	복구
	</button>
	
	</form>
	
	</td>
	
	</tr>
	
	</tbody>
	
	</table>
	
	
	

	<script>
		//================================
		//	모달 데이터 세팅 JS
		//	================================ 
		document.addEventListener("DOMContentLoaded", function() {

			const editModal = document.getElementById("editModal")

			editModal.addEventListener("show.bs.modal", function(event) {

				const button = event.relatedTarget

				document.getElementById("modalRoomId").value = button
						.getAttribute("data-id")

				document.getElementById("modalRoomName").value = button
						.getAttribute("data-name")

				document.getElementById("modalRoomGrade").value = button
						.getAttribute("data-grade")

				document.getElementById("modalBed").value = button
						.getAttribute("data-bed")

				document.getElementById("modalView").value = button
						.getAttribute("data-view")

				document.getElementById("modalPrice").value = button
						.getAttribute("data-price")

				document.getElementById("modalCount").value = button
						.getAttribute("data-count")

				document.getElementById("modalPreview").src = button
						.getAttribute("data-image")

			})

		})
	</script>

</body>
</html>
