<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>객실 승인 관리</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f8f9fa;
font-family: 'Pretendard', sans-serif;
}

.card{
border:none;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.page-title{
font-weight:600;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container mt-5">

<h3 class="page-title">객실 승인 관리</h3>

<div class="card p-4">

<table class="table table-hover">

<thead class="table-light">

<tr>
<th>객실ID</th>
<th>호텔명</th>
<th>객실명</th>
<th>가격</th>
<th>수용인원</th>
<th>관리</th>
</tr>

</thead>

<tbody>

<tr th:each="room : ${roomList}">

<td th:text="${room.room_type_id}"></td>
<td th:text="${room.hotel_name}"></td>
<td th:text="${room.room_name}"></td>
<td th:text="${room.base_price}"></td>
<td th:text="${room.max_capacity}"></td>

<td>

<form th:action="@{/admin/room/approve}" method="post" style="display:inline">

<input type="hidden"
       name="roomTypeId"
       th:value="${room.room_type_id}">

<button class="btn btn-success btn-sm">
승인
</button>

</form>

<button class="btn btn-danger btn-sm"
        th:onclick="'rejectRoom(' + ${room.room_type_id} + ')'">
반려
</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>


<script>

function rejectRoom(roomId){

let reason = prompt("반려 사유를 입력하세요");

if(reason == null || reason.trim() === ""){
return;
}

let form = document.createElement("form");
form.method = "post";
form.action = "/admin/room/reject";

let idInput = document.createElement("input");
idInput.type = "hidden";
idInput.name = "roomTypeId";
idInput.value = roomId;

let reasonInput = document.createElement("input");
reasonInput.type = "hidden";
reasonInput.name = "reason";
reasonInput.value = reason;

form.appendChild(idInput);
form.appendChild(reasonInput);

document.body.appendChild(form);
form.submit();

}

</script>

</body>

</html>
