<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">

<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">
<title>객실 승인 관리(총괄관리자)</title>

<!-- Bootstrap -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<style>

/* ============================= */
/* 전체 페이지 */
/* ============================= */
body{
background:#f5f7fb;
font-family:'Pretendard',sans-serif;
}

/* ============================= */
/* 카드 */
/* ============================= */
.card{
border:none;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
margin-bottom:30px;
}

/* ============================= */
/* 제목 */
/* ============================= */
.page-title{
font-weight:700;
margin-bottom:30px;
}

.section-title{
font-weight:600;
margin-bottom:15px;
}

/* ============================= */
/* 테이블 */
/* ============================= */
.table{
margin-bottom:0;
}

.table thead{
background:#f1f3f5;
position:sticky;
top:0;
z-index:2;
}

.table th{
font-size:14px;
padding:12px;
}

.table td{
padding:12px;
vertical-align:middle;
}

/* hover */
.table tbody tr:hover{
background:#f8fafc;
}

/* ============================= */
/* 스크롤 영역 */
/* ============================= */
.table-wrapper{
max-height:350px;
overflow-y:auto;
border-radius:10px;
}

/* ============================= */
/* 버튼 */
/* ============================= */
.btn{
border-radius:6px;
padding:4px 10px;
font-size:13px;
}

/* ============================= */
/* 뱃지 */
/* ============================= */
.badge{
font-size:12px;
padding:5px 8px;
border-radius:6px;
}

/* ============================= */
/* 구분선 */
/* ============================= */
.card-divider{
height:1px;
background:#eee;
margin:15px 0;
}

</style>

</head>


<body>

<div class="container mt-5">

<h3 class="page-title">객실 승인 관리 (총괄관리자)</h3>

<!-- ============================= -->
<!-- 호텔 필터 -->
<!-- ============================= -->
<div class="card p-3 mb-4">

<form method="get" th:action="@{/admin/room/pending}" class="d-flex gap-2">

<select name="hotelId" class="form-select w-auto"
        onchange="this.form.submit()">

    <option value="">전체 호텔</option>

	<option th:each="h : ${hotelList}"
	        th:value="${h.HOTEL_NAME}"  
	        th:text="${h.HOTEL_NAME}"
	        th:selected="${hotelId == h.HOTEL_NAME.toString()}">
	</option>

</select>

</form>

</div>


<!-- ======================================================
     승인 대기 객실
====================================================== -->

<div class="card p-4">

<h5 class="section-title">승인 대기 객실</h5>

<div class="table-wrapper">

<table class="table table-hover">

<thead>
<tr>
<th>객실ID</th>
<th>호텔명</th>
<th>객실명</th>
<th>가격</th>
<th>수용인원</th>
<th>상태</th>
<th>관리</th>
</tr>
</thead>

<tbody>

<tr th:each="room : ${pendingList}">

<td th:text="${room.room_type_id}"></td>
<td th:text="${room.hotel_name}"></td>
<td th:text="${room.room_name}"></td>
<td th:text="${#numbers.formatInteger(room.base_price,0,'COMMA')}"></td>
<td th:text="${room.max_capacity}"></td>

<td>
<span class="badge bg-warning">승인대기</span>
</td>

<td>

<form th:action="@{/admin/room/approve}"
      method="post"
      style="display:inline">

<input type="hidden"
name="roomTypeId"
th:value="${room.room_type_id}">

<button class="btn btn-success btn-sm"
        onclick="return confirm('정말 승인하시겠습니까?');">
승인
</button>

</form>

<button class="btn btn-outline-danger btn-sm"
th:onclick="'rejectRoom(' + ${room.room_type_id} + ')'">
반려
</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>



<!-- ======================================================
     승인 완료 객실
====================================================== -->

<div class="card p-4">

<h5 class="section-title">승인 완료 객실</h5>

<div class="table-wrapper">

<table class="table table-hover">

<thead>
<tr>
<th>객실ID</th>
<th>호텔명</th>
<th>객실명</th>
<th>가격</th>
<th>수용인원</th>
<th>상태</th>
</tr>
</thead>

<tbody>

<tr th:each="room : ${approvedList}">

<td th:text="${room.room_type_id}"></td>
<td th:text="${room.hotel_name}"></td>
<td th:text="${room.room_name}"></td>
<td th:text="${#numbers.formatInteger(room.base_price,0,'COMMA')}"></td>
<td th:text="${room.max_capacity}"></td>

<td>
<span class="badge bg-success">승인완료</span>

<button
class="btn btn-outline-secondary btn-sm ms-2"
th:onclick="'showHistory(' + ${room.room_type_id} + ')'">
이력
</button>
</td>

</tr>

</tbody>

</table>

</div>

</div>



<!-- ======================================================
     반려 객실
====================================================== -->

<div class="card p-4">

<h5 class="section-title">반려 객실</h5>

<div class="table-wrapper">

<table class="table table-hover">

<thead>
<tr>
<th>객실ID</th>
<th>호텔명</th>
<th>객실명</th>
<th>가격</th>
<th>수용인원</th>
<th>상태</th>
</tr>
</thead>

<tbody>

<tr th:each="room : ${rejectedList}">

<td th:text="${room.room_type_id}"></td>
<td th:text="${room.hotel_name}"></td>
<td th:text="${room.room_name}"></td>
<td th:text="${#numbers.formatInteger(room.base_price,0,'COMMA')}"></td>
<td th:text="${room.max_capacity}"></td>

<td>
<span class="badge bg-danger">반려</span>
</td>

</tr>

</tbody>

</table>

</div>

</div>



<!-- ======================================================
     객실 승인 히스토리
====================================================== -->

<div class="card p-4">

<h5 class="section-title">객실 승인 히스토리</h5>

<div class="table-wrapper">

<table class="table table-hover">

<thead>
<tr>
<th>객실ID</th>
<th>호텔명</th>
<th>객실명</th>
<th>상태</th>
<th>반려사유</th>
<th>처리자</th>
<th>처리일</th>
</tr>
</thead>

<tbody>

<tr th:each="h : ${historyList}">

<td th:text="${h['ROOM_TYPE_ID']}"></td>
<td th:text="${h['HOTEL_NAME']}"></td>
<td th:text="${h['ROOM_NAME']}"></td>

<td>

<span th:if="${h['STATUS'] == 'APPROVED'}"
class="badge bg-success">승인</span>

<span th:if="${h['STATUS'] == 'REJECTED'}"
class="badge bg-danger">반려</span>

</td>

<td th:text="${h['REASON']}"></td>
<td th:text="${h['DECIDED_BY']}"></td>
<td th:text="${h['DECIDED_AT']}"></td>

</tr>

</tbody>

</table>

</div>

</div>



</div>


<!-- ============================= -->
<!-- 이력 모달 -->
<!-- ============================= -->
<div class="modal fade" id="historyModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>객실 승인 이력</h5>
</div>

<div class="modal-body" id="historyBody">
</div>

</div>

</div>

</div>
  
<div class="text-center" style="margin-top:80px; margin-bottom:60px;">
    <a href="/final_hotel/admin/hq/dashboard" class="btn btn-dark px-4 py-2">
        관리자 메인으로 이동
    </a>
</div>


<script>

/*
---------------------------------------
객실 반려 처리
---------------------------------------
*/

function rejectRoom(roomId){

let reason = prompt("반려 사유를 입력하세요");

if(reason == null || reason.trim() === ""){
return;
}

/* csrf 값 가져오기 */
let csrfToken = document.querySelector("meta[name='_csrf']").content;

let form = document.createElement("form");

form.method = "post";
form.action = "[[@{/admin/room/reject}]]";


let idInput = document.createElement("input");
idInput.type = "hidden";
idInput.name = "roomTypeId";
idInput.value = roomId;


let reasonInput = document.createElement("input");
reasonInput.type = "hidden";
reasonInput.name = "reason";
reasonInput.value = reason;

/* csrf hidden */
let csrfInput = document.createElement("input");
csrfInput.type = "hidden";
csrfInput.name = "_csrf";
csrfInput.value = csrfToken;


form.appendChild(idInput);
form.appendChild(reasonInput);
form.appendChild(csrfInput);

document.body.appendChild(form);

form.submit();

}


/* 승인히스토리 모달 조회 */
function showHistory(roomId){

fetch("[[@{/admin/room/history}]]?roomTypeId=" + roomId)

.then(res => res.json())

.then(data => {

if(!Array.isArray(data)){
console.error("history data error", data)
return
}

let html = ""

data.forEach(h => {

html += `
<div style="border-bottom:1px solid #ddd;padding:8px">
상태 : ${h.STATUS}<br>
사유 : ${h.REASON ?? '-'}<br>
처리일 : ${h.DECIDED_AT}
</div>
`

})

document.getElementById("historyBody").innerHTML = html

new bootstrap.Modal(
document.getElementById("historyModal")
).show()

})

}

</script>


</body>
</html>
