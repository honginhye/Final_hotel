<style>

.hotel-card{
border-radius:10px;
overflow:hidden;

box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.2s;
}

/* 카드 hover 효과 */
.hotel-card:hover{
transform:translateY(-3px);
}

/* 호텔 이미지 */
.hotel-img{
width:100%;
height:220px;
object-fit:cover;
}

/* 카드 내부 */
.hotel-body{
padding:15px;
}

/* 호텔 이름 */
.hotel-name{
font-size:18px;
font-weight:bold;
}

/* 승인 대기 섹션 배경 */

background:#f8f9fa;
padding:25px;
border-radius:10px;
}

</style>

<script>

/* ================= 상태 필터 ================= */

function filterHotel(status){

const cards = document.querySelectorAll(".hotel-card-item");

cards.forEach(card=>{

const hotelStatus = card.dataset.status;

if(status === "ALL"){
card.style.display="block";
}
else if(hotelStatus === status){
card.style.display="block";
}
else{
card.style.display="none";
}

})

}


/* ================= 호텔 검색 ================= */

function searchHotel(){

let input = document.getElementById("searchInput").value.toLowerCase();

let cards = document.querySelectorAll(".hotel-card-item");

cards.forEach(card=>{

let name = card.querySelector(".hotel-name").innerText.toLowerCase();

if(name.includes(input)){
card.style.display="block";
}else{
card.style.display="none";
}

})

}


/* 호텔 다시 활성화시키기 */
function restoreHotel(hotelId){

	if(!confirm("정말 다시 원복하시겠습니까?")){
		return;
		}
	
	const token = document.querySelector('meta[name="_csrf"]').content;
	const header = document.querySelector('meta[name="_csrf_header"]').content;	
	
	fetch("[[@{/admin/hotel/restore}]]",{

	method:"POST",
	headers:{
		"Content-Type":"application/json",
		[header]: token
		},

	body:JSON.stringify({
	hotel_id:hotelId
	})

	})
	.then(res=>res.json())
	.then(()=>{

	alert("호텔이 다시 활성화되었습니다.");

	location.reload();

	})

	}
