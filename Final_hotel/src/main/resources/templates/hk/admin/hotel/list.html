<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<meta charset="UTF-8">
<title>호텔 관리</title>

<style>

.hotel-card{
    border-radius:10px;
    overflow:hidden;
    margin-bottom:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.hotel-card:hover{
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.hotel-img{
    width:100%;
    height:auto;
}

.hotel-body{
    padding:15px;
}

.hotel-name{
    font-size:18px;
    font-weight:bold;
}

.hotel-status{
    font-size:13px;
    margin-top:5px;
}

</style>

</head>


<body>

<div class="container">

<h2 class="text-center my-5">호텔 관리</h2>

<div>
<h3>전체 숙소 리스트</h3>

	<div class="row">

		<div class="col-md-4"
		     th:each="hotel : ${hotelList}">
		
		<div class="hotel-card">
		
		<img class="hotel-img"
		     th:src="@{${hotel.IMAGE_URL}}"
		     alt="호텔이미지">
		
		<div class="hotel-body">
		
		<div class="hotel-name"
		     th:text="${hotel.HOTEL_NAME}">
		</div>
		
		<div class="hotel-status">
		
		<span th:if="${hotel.APPROVE_STATUS=='PENDING'}"
		      class="badge bg-warning">
		심사중
		</span>
		
		<span th:if="${hotel.APPROVE_STATUS=='APPROVED'}"
		      class="badge bg-success">
		운영중
		</span>
		
		<span th:if="${hotel.APPROVE_STATUS=='REJECTED'}"
		      class="badge bg-danger">
		반려
		</span>
		
		</div>
		
		<div class="mt-3">
		
		<a class="btn btn-sm btn-primary"
		   th:href="@{/admin/hotel/detail(hotel_id=${hotel.HOTEL_ID})}">
		상세보기
		</a>
		
		</div>
		
		</div>
		
		</div>
		
		</div>
		
	</div>
	

</div>

<div>

</div>
		<a class="btn btn-secondary"
		   th:href="@{/admin/hotel/register}">
		호텔 등록하기
		</a>
</div>

</body>
</html>
