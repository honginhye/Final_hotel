<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>예약 관리</title>

<style>

/* 페이지 기본 */
body{
font-family: Arial;
margin:40px;
}

/* ================================ */
/* KPI 카드 스타일 */
/* ================================ */

.kpi-container{
display:flex;
gap:20px;
margin-bottom:40px;
}

.kpi-card{
flex:1;
background:#f7f7f7;
border-radius:10px;
padding:20px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.kpi-title{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.kpi-value{
font-size:28px;
font-weight:bold;
}

/* ================================ */
/* 테이블 스타일 */
/* ================================ */

table{
border-collapse:collapse;
width:100%;
margin-bottom:40px;
}

/* 셀 */
th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

/* 헤더 */
th{
background:#f3f3f3;
}

/* 버튼 */
button{
padding:6px 12px;
cursor:pointer;
}

/* 체크인 진행률 */
.progress-container{
margin-bottom:40px;
}

.progress-bar-bg{
width:100%;
background:#eee;
border-radius:10px;
overflow:hidden;
height:20px;
}

.progress-bar-fill{
background:#4CAF50;
height:100%;
}
</style>

</head>

<body>

<h2>관리자 예약 관리</h2>


<!-- ================================ -->
<!-- KPI 요약 -->
<!-- ================================ -->

<div class="kpi-container">

<div class="kpi-card">
<div class="kpi-title">오늘 체크인 예정</div>
<div class="kpi-value"
     th:text="${todayCheckinReserved} + '건'"></div>
</div>

<div class="kpi-card">
<div class="kpi-title">오늘 체크인 완료</div>
<div class="kpi-value"
     th:text="${todayCheckinDone} + '건'"></div>
</div>

<div class="kpi-card">
<div class="kpi-title">현재 투숙중</div>
<div class="kpi-value"
     th:text="${stayCount} + '건'">0건</div>
</div>

<div class="kpi-card">
<div class="kpi-title">객실 점유율</div>
<div class="kpi-value"
     th:text="${occupancyRate} + '%'">0%</div>
</div>

</div>

<!-- ================================ -->
<!-- 체크인 진행률 -->
<!-- ================================ -->

<div class="progress-container">

<h3>오늘 체크인 진행률</h3>

<div class="progress-bar-bg">

<div class="progress-bar-fill"
     th:style="'width:' + ${checkinProgress} + '%'">
</div>

</div>

<div style="margin-top:8px;font-weight:bold;"
     th:text="${checkinProgress} + '%'">
</div>

</div>

<!-- ================================ -->
<!-- 1. 오늘 체크인 -->
<!-- ================================ -->

<h3>오늘 체크인</h3>

<table>

<tr>
<th>예약번호</th>
<th>예약자</th>
<th>객실</th>
<th>체크인</th>
<th>체크아웃</th>
<th>금액</th>
<th>관리</th>
</tr>

<tr th:each="r : ${checkinList}">

<td th:text="${r['RESERVATION_ID']}"></td>

<td th:text="${r['NAME']}"></td>

<td th:text="${r['ROOM_NAME']}"></td>

<!-- 날짜 포맷 -->
<td th:text="${#dates.format(r['CHECKIN_DATE'],'yyyy-MM-dd')}"></td>

<td th:text="${#dates.format(r['CHECKOUT_DATE'],'yyyy-MM-dd')}"></td>

<td th:text="${#numbers.formatInteger(r['TOTAL_PRICE'],3,'COMMA')} + '원'"></td>

<td>

<!-- 체크인 버튼 -->
<form th:action="@{/admin/reservation/checkin}" method="post"
onsubmit="return confirm('체크인 처리하시겠습니까?')">

<input type="hidden"
name="reservationId"
th:value="${r['RESERVATION_ID']}">

<button type="submit">체크인</button>

</form>

</td>

</tr>

</table>



<!-- ================================ -->
<!-- 2. 투숙중 -->
<!-- ================================ -->

<h3>투숙중</h3>

<table>

<tr>
<th>예약번호</th>
<th>예약자</th>
<th>객실</th>
<th>체크인</th>
<th>체크아웃</th>
<th>금액</th>
<th>관리</th>
</tr>

<tr th:each="r : ${stayList}">

<td th:text="${r['RESERVATION_ID']}"></td>

<td th:text="${r['NAME']}"></td>

<td th:text="${r['ROOM_NAME']}"></td>

<td th:text="${#dates.format(r['CHECKIN_DATE'],'yyyy-MM-dd')}"></td>

<td th:text="${#dates.format(r['CHECKOUT_DATE'],'yyyy-MM-dd')}"></td>

<td th:text="${r['TOTAL_PRICE']}"></td>

<td>

<!-- 체크아웃 버튼 -->
<form th:action="@{/admin/reservation/checkout}" method="post"
onsubmit="return confirm('체크아웃 처리하시겠습니까?')">

<input type="hidden"
name="reservationId"
th:value="${r['RESERVATION_ID']}">

<button type="submit">체크아웃</button>

</form>

</td>

</tr>

</table>



<!-- ================================ -->
<!-- 3. 오늘 체크아웃 예정 -->
<!-- ================================ -->

<h3>오늘 체크아웃 예정</h3>

<table>

<tr>
<th>예약번호</th>
<th>예약자</th>
<th>객실</th>
<th>체크인</th>
<th>체크아웃</th>
<th>금액</th>
<th>상태</th>
</tr>

<tr th:each="r : ${checkoutList}">

<td th:text="${r['RESERVATION_ID']}"></td>

<td th:text="${r['NAME']}"></td>

<td th:text="${r['ROOM_NAME']}"></td>

<td th:text="${#dates.format(r['CHECKIN_DATE'],'yyyy-MM-dd')}"></td>

<td th:text="${#dates.format(r['CHECKOUT_DATE'],'yyyy-MM-dd')}"></td>

<td th:text="${r['TOTAL_PRICE']}"></td>

<td>체크아웃 예정</td>

</tr>

</table>



<!-- ================================ -->
<!-- 4. 체크아웃 완료 -->
<!-- ================================ -->

<h3>체크아웃 완료</h3>

<table>

<tr>
<th>예약번호</th>
<th>예약자</th>
<th>객실</th>
<th>체크인</th>
<th>체크아웃</th>
<th>금액</th>
<th>상태</th>
</tr>

<tr th:each="r : ${checkoutCompleteList}">

<td th:text="${r['RESERVATION_ID']}"></td>

<td th:text="${r['NAME']}"></td>

<td th:text="${r['ROOM_NAME']}"></td>

<td th:text="${#dates.format(r['CHECKIN_DATE'],'yyyy-MM-dd')}"></td>

<td th:text="${#dates.format(r['CHECKOUT_DATE'],'yyyy-MM-dd')}"></td>

<td th:text="${r['TOTAL_PRICE']}"></td>

<td>체크아웃 완료</td>

</tr>

</table>


</body>
</html>
