<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::content})}">
<head>
<meta charset="UTF-8">
<title>마이페이지 - 예약 조회</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
    background:#f8f9fa;
}

.container{
    margin-top:50px;
}

.title{
    font-weight:600;
    margin-bottom:25px;
}

.status-confirmed{
    color:green;
    font-weight:bold;
}

.status-cancelled{
    color:red;
    font-weight:bold;
}

</style>

</head>

<body>

<div th:fragment="content" style="margin-top:140px;">

<div class="container">

<h3 class="title">내 예약 목록</h3>

<table class="table table-bordered table-hover text-center">

<thead class="table-dark">

<tr>
<th>예약코드</th>
<th>호텔</th>
<th>객실</th>
<th>체크인</th>
<th>체크아웃</th>
<th>투숙인원</th>
<th>결제금액</th>
<th>예약상태</th>
<th>기능</th>
</tr>

</thead>

<tbody>

<tr th:if="${#lists.isEmpty(reservationList)}">
<td colspan="9">예약 내역이 없습니다.</td>
</tr>

<tr th:each="r : ${reservationList}">

<td th:text="${r['RESERVATION_CODE']}"></td>

<td th:text="${r['HOTEL_NAME']}"></td>

<td th:text="${r['ROOM_NAME']}"></td>

<td th:text="${#strings.substring(r['CHECKIN_DATE'],0,10)}"></td>
<td th:text="${#strings.substring(r['CHECKOUT_DATE'],0,10)}"></td>

<td th:text="${r['GUEST_COUNT']}"></td>

<td th:text="${#numbers.formatInteger(r['TOTAL_PRICE'],0,'COMMA')} + '원'"></td>

<td>

<span th:if="${r['RESERVATION_STATUS'] == 'CONFIRMED'}"
      class="status-confirmed">예약완료</span>

<span th:if="${r['RESERVATION_STATUS'] == 'CANCELLED'}"
      class="status-cancelled">예약취소</span>

</td>

<td>

<button class="btn btn-danger btn-sm"
        th:if="${r['RESERVATION_STATUS'] == 'CONFIRMED'}"
        th:attr="data-id=${r['RESERVATION_ID']}"
        onclick="cancelReservation(this)">
예약취소
</button>

</td>

</tr>

</tbody>

</table>

</div>
</div>


<script>

function cancelReservation(btn){

    const reservationId = btn.getAttribute("data-id");

    if(!confirm("예약을 취소하시겠습니까?")){
        return;
    }

    fetch("/reservation/cancel",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:"reservation_id="+reservationId
    })
    .then(res => res.text())
    .then(data => {

        if(data === "success"){
            alert("예약이 취소되었습니다.");
            location.reload();
        }
        else{
            alert("취소 실패");
        }

    });

}

</script>

</body>
</html>
