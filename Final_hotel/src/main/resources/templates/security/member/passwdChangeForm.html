<!DOCTYPE html>
<html th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::div.container})}"
      lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>비밀번호 변경</title>

<link rel="stylesheet" href="">

<style>
:root{
  --bg:#ffffff;
  --panel:#ffffff;
  --line:#e7e7e7;
  --line-2:#d9d9d9;
  --text:#111111;
  --muted:#6f6f6f;
  --danger:#c94b4b;
  --header-offset:165px;
  --page-bottom:90px;
  --radius:10px;
  --shadow:0 10px 24px rgba(0,0,0,.04);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  background:#fff;
  color:var(--text);
}
.container{
  min-height:calc(100vh - 40px);
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:var(--header-offset) 16px var(--page-bottom);
}
.wrap{
  width:460px;
  max-width:100%;
}
.brandbar{
  display:flex;
  justify-content:center;
  margin-bottom:18px;
  font-size:.92rem;
  letter-spacing:.24em;
  color:#111;
  font-weight:700;
}
.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
}
.header{
  padding:24px 22px 18px;
  text-align:center;
  border-bottom:1px solid var(--line);
  background:#fafafa;
}
.header h1{
  margin:0;
  font-size:1.45rem;
  font-weight:700;
  letter-spacing:.5px;
}
.header p{
  margin:10px 0 0;
  color:var(--muted);
  font-size:.9rem;
}
.body{padding:22px;}
.hint{
  font-size:.84rem;
  color:var(--muted);
  line-height:1.7;
  background:#fafafa;
  border:1px solid var(--line);
  border-radius:8px;
  padding:13px;
  margin-bottom:16px;
}
.field{margin-bottom:14px;}
.label{
  margin-bottom:7px;
  font-size:.9rem;
  color:#444;
  font-weight:700;
}
.input{
  width:100%;
  padding:14px 14px;
  border:1px solid var(--line-2);
  border-radius:8px;
  outline:none;
  background:#fff;
  font-size:.95rem;
  font-family:inherit;
}
.input:focus{
  border-color:#111;
  box-shadow:0 0 0 4px rgba(17,17,17,.05);
}
.btn{
  width:100%;
  border:0;
  border-radius:999px;
  padding:14px 16px;
  font-weight:700;
  cursor:pointer;
  background:#111;
  color:#fff;
  font-size:.95rem;
  transition:.2s ease;
}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow);
}
.error{
  display:none;
  margin-top:12px;
  font-size:.84rem;
  color:#fff;
  background:var(--danger);
  border-radius:8px;
  padding:11px 12px;
  line-height:1.5;
}
.error.show{display:block;}
.links{
  margin-top:16px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:.83rem;
}
.links a{
  color:var(--muted);
  text-decoration:none;
}
.links a:hover{color:#111;}
</style>

<script th:inline="javascript">
/*<![CDATA[*/
document.addEventListener('DOMContentLoaded', () => {

  const frm = document.getElementById('passwdChangeFrm');
  const err = document.getElementById('err');
  const btn = document.getElementById('btnPwdChange');

  function show(msg){
    err.textContent = msg;
    err.classList.add('show');
  }

  function submitChange(){
    err.classList.remove('show');

    const passwd = frm.passwd.value.trim();
    const passwd2 = frm.passwd2.value.trim();

    const regExp = new RegExp(/^.*(?=^.{8,15}$)(?=.*\d)(?=.*[a-zA-Z])(?=.*[^a-zA-Z0-9]).*$/g);

    if(!regExp.test(passwd)){
      return show("새비밀번호는 숫자/영문자/특수문자가 혼합된 8~15자리 이내이어야 합니다.");
    }
    if(passwd !== passwd2){
      return show("새비밀번호 입력값이 다릅니다.");
    }

    frm.action = /*[[@{/security/passwdChange}]]*/ 'url';
    frm.method = "post";
    frm.submit();
  }

  btn.addEventListener('click', submitChange);
  frm.passwd2.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ submitChange(); }
  });
});
/*]]>*/
</script>
</head>

<body>
<div class="container">
  <div class="wrap">
    <div class="brandbar">CIEL</div>

    <section class="card" aria-label="비밀번호 변경 카드">
      <div class="header">
        <h1>비밀번호 변경</h1>
        <p>새 비밀번호를 입력해주세요.</p>
      </div>

      <div class="body">
        <div class="hint">
          비밀번호는 숫자, 영문자, 특수문자를 포함한 8~15자리로 설정해주세요.
        </div>

        <form id="passwdChangeFrm" name="passwdChangeFrm">
          <div class="field">
            <div class="label"><span>새 비밀번호</span></div>
            <input class="input" type="password" name="passwd" id="passwd" placeholder="새 비밀번호 입력" />
          </div>

          <div class="field">
            <div class="label"><span>새 비밀번호 확인</span></div>
            <input class="input" type="password" name="passwd2" id="passwd2" placeholder="새 비밀번호 다시 입력" />
          </div>

          <button class="btn" type="button" id="btnPwdChange">비밀번호 변경</button>
          <div class="error" id="err"></div>

          <div class="links">
            <a th:href="@{/security/member/mypage}">마이페이지</a>
            <span>|</span>
            <a th:href="@{/index}">메인</a>
          </div>
        </form>
      </div>
    </section>
  </div>
</div>
</body>
</html>
