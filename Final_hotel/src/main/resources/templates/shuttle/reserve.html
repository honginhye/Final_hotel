<!doctype html>
<html th:replace="~{js/layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::div.container})}"
      lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>셔틀 예약</title>
  <link rel="stylesheet" href="">
  <style>
    :root{--bg:#F7F2EC;--card:#fff;--line:#E3D6C9;--text:#2C2420;--muted:#7A6A5C;--brand:#7B5A46;--danger:#B42318;}
    body{background:var(--bg);color:var(--text);}
    .container{max-width:1100px;margin:0 auto;padding:26px 18px;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media (max-width:980px){.grid{grid-template-columns:1fr;}}
    table{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
    th,td{padding:10px 10px;border-bottom:1px solid var(--line);font-size:13px;}
    th{background:#FBF7F3;text-align:left;}
    tr:last-child td{border-bottom:none;}
    .pill{display:inline-flex;gap:8px;align-items:center;padding:7px 11px;border-radius:999px;border:1px solid var(--line);background:#FBF7F3;font-size:13px;}
    .muted{color:var(--muted);font-size:13px;}
    .btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 12px;font-weight:800;cursor:pointer;}
    .btn-primary{background:var(--brand);color:#fff;border-color:transparent;}
    .btn-danger{background:var(--danger);color:#fff;border-color:transparent;}
    .qty{width:80px;border:1px solid var(--line);border-radius:12px;padding:8px 10px;}
    .notice{padding:10px 12px;border-radius:14px;border:1px solid var(--line);background:#E7F3EA;color:#2F7D57;font-size:13px;margin-bottom:10px;}
  </style>
  <script>
  /*<![CDATA[*/
  /*]]>*/
  </script>
</head>

<body>
<div class="container">

  <div class="card">
    <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center;">
      <div>
        <div style="font-size:18px;font-weight:900;">셔틀 예약</div>
        <div class="muted">
          예약번호: <b th:text="${page.reservation.reservationId}"></b> /
          호텔: <b th:text="${page.reservation.hotelName}"></b>
        </div>
      </div>
      <div class="pill">최대 티켓: <b th:text="${page.reservation.guestCount}"></b></div>
    </div>
    <div class="muted" style="margin-top:8px;">
      취소 규정: 전날 18:00까지 / 시간 변경은 취소 후 재예약
    </div>
  </div>

  <div class="grid">

    <!-- TO_HOTEL -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <b>호텔행 (체크인)</b>
        <span class="pill">탑승일: <b th:text="${#dates.format(page.toRideDate,'yyyy-MM-dd')}"></b></span>
      </div>

      <div th:if="${page.toBookedLeg != null and page.toBookedLeg.legStatus == 'BOOKED'}" class="notice">
        이미 예약됨:
        <b th:text="${page.toBookedLeg.placeCode}"></b> /
        <b th:text="${page.toBookedLeg.departTime}"></b> /
        <b th:text="${page.toBookedLeg.ticketQty}"></b>매
        <form th:action="@{/shuttle/cancel}" method="post" style="display:inline;">
          <input type="hidden" name="reservationId" th:value="${page.reservation.reservationId}">
          <input type="hidden" name="legType" value="TO_HOTEL">
          <button class="btn btn-danger" type="submit" style="margin-left:10px;">취소</button>
          <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        </form>
      </div>

      <table>
        <thead>
        <tr>
          <th style="width:90px;">시간</th>
          <th>픽업</th>
          <th style="width:90px;">잔여</th>
          <th style="width:230px;">예약</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${page.toList}">
          <td th:text="${t.departTime}"></td>
          <td th:text="${t.placeName}"></td>
          <td><b th:text="${t.remaining}"></b><span class="muted"> / </span><span class="muted" th:text="${t.capacity}"></span></td>
          <td>
            <form th:action="@{/shuttle/book}" method="post" style="display:flex;gap:8px;align-items:center;">
              <input type="hidden" name="reservationId" th:value="${page.reservation.reservationId}">
              <input type="hidden" name="legType" value="TO_HOTEL">
              <input type="hidden" name="timetableId" th:value="${t.timetableId}">
              <input class="qty" type="number" name="ticketQty" min="1" value="1"
                     th:attr="max=${page.reservation.guestCount}"
                     th:disabled="${page.toBookedLeg != null and page.toBookedLeg.legStatus=='BOOKED'}">
              <button class="btn btn-primary" type="submit"
                      th:disabled="${(page.toBookedLeg != null and page.toBookedLeg.legStatus=='BOOKED') or (t.remaining <= 0)}">
                예약
              </button>
              <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- FROM_HOTEL -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <b>행선지행 (체크아웃)</b>
        <span class="pill">탑승일: <b th:text="${#dates.format(page.fromRideDate,'yyyy-MM-dd')}"></b></span>
      </div>

      <div th:if="${page.fromBookedLeg != null and page.fromBookedLeg.legStatus == 'BOOKED'}" class="notice">
        이미 예약됨:
        <b th:text="${page.fromBookedLeg.placeCode}"></b> /
        <b th:text="${page.fromBookedLeg.departTime}"></b> /
        <b th:text="${page.fromBookedLeg.ticketQty}"></b>매
        <form th:action="@{/shuttle/cancel}" method="post" style="display:inline;">
          <input type="hidden" name="reservationId" th:value="${page.reservation.reservationId}">
          <input type="hidden" name="legType" value="FROM_HOTEL">
          <button class="btn btn-danger" type="submit" style="margin-left:10px;">취소</button>
          <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        </form>
      </div>

      <table>
        <thead>
        <tr>
          <th style="width:90px;">시간</th>
          <th>도착지</th>
          <th style="width:90px;">잔여</th>
          <th style="width:230px;">예약</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${page.fromList}">
          <td th:text="${t.departTime}"></td>
          <td th:text="${t.placeName}"></td>
          <td><b th:text="${t.remaining}"></b><span class="muted"> / </span><span class="muted" th:text="${t.capacity}"></span></td>
          <td>
            <form th:action="@{/shuttle/book}" method="post" style="display:flex;gap:8px;align-items:center;">
              <input type="hidden" name="reservationId" th:value="${page.reservation.reservationId}">
              <input type="hidden" name="legType" value="FROM_HOTEL">
              <input type="hidden" name="timetableId" th:value="${t.timetableId}">
              <input class="qty" type="number" name="ticketQty" min="1" value="1"
                     th:attr="max=${page.reservation.guestCount}"
                     th:disabled="${page.fromBookedLeg != null and page.fromBookedLeg.legStatus=='BOOKED'}">
              <button class="btn btn-primary" type="submit"
                      th:disabled="${(page.fromBookedLeg != null and page.fromBookedLeg.legStatus=='BOOKED') or (t.remaining <= 0)}">
                예약
              </button>
              <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
</body>
</html>
